            {id:91, name:"데 가스파리스 릴 (De Gasparis Rilles)", sig:"교차 릴", sig_en:"Intersecting Rilles", lat:-25.9, lng:-50.7, diam:30, desc:"습기의 바다 서쪽 훼손된 데 가스파리스 크레이터를 중심으로, 마구잡이로 할퀴고 지나간 듯한 대규모 교차 단층대입니다. 달 지각의 팽창과 수축 장력이 겹치며 선형 균열들이 X자 모양으로 교차합니다.", desc_en:"Centered around the degraded De Gasparis crater, this is a massive intersecting fault zone looking randomly clawed. Overlapping expansion and contraction tensions caused linear rilles to intersect in X patterns.", obs:"[추천 관측 월령: 12~13일경, 26~27일경]\n[최적의 관측 타이밍]\n수많은 균열선들이 얽혀 있으므로 빛이 얕게 비추는 사선광 조건에서 계곡 내부로 드리워진 짙은 그림자망을 확인해야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n지반이 교차하여 찢어지는 지질학적 폭력을 눈으로 확인하는 타겟입니다. 150배율 이상의 고배율로 북서-남동 방향으로 달리는 굵은 균열과 북동-남서 방향으로 달리는 가느다란 틈새들이 데 가스파리스 내부에서 어떻게 십자 포화로 만나 조각내는지 분해해 보십시오.\n[사진 촬영 팁]\n대비가 훌륭한 적색(Red) 필터를 활용하여 파괴적인 단층선의 기하학적 X자 패턴을 날카롭게 뽑아내는 것이 핵심입니다.", obs_en:"[Recommended Moon Age: 12~13 days, 26~27 days]\n[Optimal Timing]\nWith so many intertwined fracture lines, you must confirm the dark shadow networks cast inside the valleys under shallow slanted light conditions.\n[What to look for? (Visual)]\nA target to visually confirm geological violence. Using 150x+, precisely resolve how the thick NW-SE running fractures and the thinner NE-SW gaps meet in a crossfire within De Gasparis, severing and carving up each other.\n[Astrophotography Tips]\nUse a high-contrast Red filter to sharply extract the destructive geometric X-patterns of the fault lines."},
            {id:92, name:"길덴 계곡 (Gyldén Valley)", sig:"거대 파편 흔적", sig_en:"Debris Valley", lat:-5.1, lng:0.7, diam:47, desc:"프톨레마이오스 크레이터 북쪽에 폭넓게 긁혀 있는 직경 47km, 길이 150km 규모의 거친 파편 상흔입니다. 비의 바다 거대 충돌 시 튀어오른 산더미만 한 바위 파편들이 맹렬한 속도로 날아가다 지면을 파낸 이차 충돌 골짜기입니다.", desc_en:"A rough debris valley, 47km wide and 150km long, broadly scraped north of Ptolemaeus. Formed when mountain-sized rock ejecta from the Imbrium impact flew at furious speeds, violently scouring the ground.", obs:"[추천 관측 월령: 7~8일경, 21~22일경]\n[최적의 관측 타이밍]\n명암 경계선이 이 일대를 통과하여 거친 파편의 쓸린 상흔들이 입체적으로 부각되는 상현달/하현달 부근을 공략하세요.\n[무엇을 봐야 할까? (안시 관측)]\n100배율 내외로 관측하면 지형의 방향성이 명확히 드러납니다. 둥근 형태를 띠어야 할 고지대의 지형들과 작은 크레이터들이 무자비하게 북서쪽에서 남동쪽 방향으로 일제히 뭉개지고 길쭉하게 파인 '비의 바다 조각(Imbrium Sculpture)' 질감을 가장 생생하게 체감할 수 있습니다.\n[사진 촬영 팁]\n달의 정중앙 부근이라 시상의 흔들림이 잘 보입니다. 초점비(f-ratio)를 줄이더라도 깨끗한 단일 프레임 확보에 집중하십시오.", obs_en:"[Recommended Moon Age: 7~8 days, 21~22 days]\n[Optimal Timing]\nTarget around quarter moons when the terminator passes this area, bringing the swept debris scars into sharp 3D relief.\n[What to look for? (Visual)]\nObserve at ~100x to clearly reveal the terrain's directionality. It's an excellent teaching tool to vividly experience the 'Imbrium Sculpture' texture, where features and small craters that should be round are ruthlessly smeared and elongated from NW to SE.\n[Astrophotography Tips]\nLocated near the moon's center, seeing turbulence is very apparent. Even if you reduce the f-ratio, focus on securing clean single frames."},
            {id:93, name:"디오니시우스 광조 (Dionysius Rays)", sig:"검은 광조", sig_en:"Dark Rays", lat:2.8, lng:17.3, diam:18, desc:"고요의 바다 서쪽 고지대에 위치한 크레이터입니다. 일반적인 밝은 광조와 달리, 충돌 시 지표면 아래 얕게 묻혀 있던 어두운 현무암 물질을 파내어 사방으로 뿜어낸 이례적인 '암색 광조(Dark Ray)'를 형성했습니다.", desc_en:"A crater on the highland edge west of Mare Tranquillitatis. Unlike typical bright rays, the impact excavated a shallow buried layer of dark basalt, spewing black debris in all directions to form anomalous 'Dark Rays'.", obs:"[추천 관측 월령: 보름 전후]\n[최적의 관측 타이밍]\n그림자가 사라지고 오로지 알베도(반사율)의 차이만이 남는 보름달 시기에 이 이례적인 검은 띠가 명확하게 보입니다.\n[무엇을 봐야 할까? (안시 관측)]\n밝게 빛나는 사장암 고지대를 하얀 캔버스 삼아, 디오니시우스 크레이터를 중심으로 동서 양옆으로 짙은 먹물이 뻗어 나간 듯한 토끼 귀 모양의 독특하고 어두운 띠를 80배 이상의 아이피스로 뚜렷하게 대조해 보십시오.\n[사진 촬영 팁]\n주변 고지대의 화이트홀(노출 오버)을 피하고 검은 광조의 미묘한 톤을 뽑아내려면, 미네랄 문 처리 시 밝기 명암 곡선을 S자로 강하게 꺾어주세요.", obs_en:"[Recommended Moon Age: Around Full Moon]\n[Optimal Timing]\nEssential to observe near full moon when shadows vanish and only albedo differences remain, making these anomalous black bands clear.\n[What to look for? (Visual)]\nUsing the brightly shining anorthosite highlands as a white canvas, use 80x+ power to clearly contrast the unique, dark, rabbit-ear-like bands stretching east and west from Dionysius like spilled ink.\n[Astrophotography Tips]\nTo avoid blowing out the surrounding bright highlands while extracting the subtle dark rays, sharply bend the brightness/contrast curve into an S-shape during Mineral Moon processing."},
            {id:94, name:"드리가스키 (Drygalski)", sig:"남극 가장자리", sig_en:"South Pole Rim", lat:-79.3, lng:-84.9, diam:162, desc:"달의 남서쪽 지평선 너머 뒷면을 향해 위치한 거대한 다중 고리 크레이터입니다. 태양계 최대 규모인 '남극-에이킨 분지' 외곽을 감싸는 산맥 고리의 일부분으로, 우주적 스케일의 지각 변동을 증명합니다.", desc_en:"A massive multi-ring crater located just beyond the SW horizon. It constitutes a section of the mountain ring encircling the 'South Pole-Aitken Basin' (solar system's largest), proving cosmic-scale crustal movements.", obs:"[추천 관측 월령: 남/서 칭동 최대 시]\n[최적의 관측 타이밍]\n달의 남서쪽 칭동(Libration)이 최대치로 기울어 달의 뒷면 가장자리가 간신히 드러나는 날만을 기다려야 하는 극한의 타겟입니다.\n[무엇을 봐야 할까? (안시 관측)]\n칭동 조건이 부합할 때 100~150배율로 지평선 끝자락을 샅샅이 뒤져야 합니다. 거대한 산봉우리들이 어두운 우주 공간을 배경으로 지평선 위로 아슬아슬하게 우뚝 솟아 요철을 이루며 거친 톱니바퀴 같은 실루엣을 그려내는 것을 엿볼 수 있습니다.\n[사진 촬영 팁]\n지평선 가장자리 끄트머리에 걸려 있으므로, 안시 관측보다 카메라를 이용한 장노출 스태킹(Stacking)이 이 산맥의 윤곽을 식별해 내는 데 훨씬 유리합니다.", obs_en:"[Recommended Moon Age: Max SW Libration]\n[Optimal Timing]\nAn extreme target that requires waiting for the specific days when SW libration tilts maximally, barely revealing the far-side limb.\n[What to look for? (Visual)]\nWhen libration conditions are met, scour the extreme horizon at 100-150x. You can barely peek at the rough, sawtooth silhouette of its massive peaks precariously towering over the horizon against the backdrop of the dark void of space.\n[Astrophotography Tips]\nBecause it hangs on the absolute edge of the horizon, long-exposure stacking with a camera is much more advantageous than visual observation for identifying the mountain outlines."},
            {id:95, name:"폭풍의 대양 (Oceanus Procellarum)", sig:"최대 바다", sig_en:"Largest Mare", lat:23.0, lng:-15.0, diam:3200, desc:"동서 길이만 3,000km가 넘으며, 달 앞면의 서쪽 3분의 1을 덮고 있는 표면 최대의 화산암 평원입니다. 여러 지역의 틈새를 통해 수천만 년에 걸쳐 범람한 용암이 합쳐져 형성된 비정형 평원입니다.", desc_en:"Spanning over 3,000km east-west, it is the most vast volcanic plain, completely covering the western third of the near side. An irregular plain formed by lava erupting through fissures and merging over tens of millions of years.", obs:"[추천 관측 월령: 전 월령]\n[최적의 관측 타이밍]\n달빛이 가장 밝아지는 보름달 무렵, 눈부신 고지대와의 극명한 넓이 대조를 체감할 수 있습니다.\n[무엇을 봐야 할까? (안시 관측)]\n망원경 없이 맨눈이나 소형 쌍안경만으로 달 앞면 왼쪽을 짙고 어둡게 덮어버린 거대한 바다의 압도적 크기와 형태를 한눈에 체감하십시오. 주변의 비의 바다나 습기의 바다와 톤이 어떻게 미묘하게 연결되는지 알베도(반사율)의 차이를 넓게 즐기는 대상입니다.\n[사진 촬영 팁]\n일반 광각 렌즈나 스마트폰 야간 모드를 활용해 구름이나 지구의 풍경(랜드스케이프)과 함께 어우러지는 달의 전체 샷을 감성적으로 담아보세요.", obs_en:"[Recommended Moon Age: All phases]\n[Optimal Timing]\nAround full moon when the moonlight is brightest, you can truly experience its stark size contrast against the blinding highlands.\n[What to look for? (Visual)]\nSimply using your naked eye or small binoculars to take in the overwhelming size and shape of this giant dark sea blanketing the left half of the moon. Feel the subtle albedo differences and how its tone merges with Mare Imbrium or Humorum on a macro scale.\n[Astrophotography Tips]\nUse a standard wide-angle lens or smartphone night mode to emotionally capture a full-disk shot of the moon blending with earthly landscapes or clouds."},
            {id:96, name:"라이프니츠 산맥 (Leibnitz Mountains)", sig:"최고도 산맥", sig_en:"Highest Mountains", lat:-85.0, lng:30.0, diam:300, desc:"달의 정남극 부근 뒷면에 위치한 달에서 가장 고도가 높고 거대한 산맥계입니다. 최대 높이가 8,000m 이상으로 솟아 있으며, '남극-에이킨 분지'가 형성될 때 밀려 올라간 거대한 외곽 테두리의 일부입니다.", desc_en:"The highest and most massive mountain range on the moon, near the true south pole on the far side. Peaks rise over 8,000m, forming part of the massive outer rim uplifted by the 'South Pole-Aitken Basin' impact.", obs:"[추천 관측 월령: 남쪽 칭동 시]\n[최적의 관측 타이밍]\n남쪽 칭동(Libration)이 최대가 되어 달이 고개를 위로 들어 뒷면 남극을 아슬아슬하게 보여주는 타이밍이 핵심입니다.\n[무엇을 봐야 할까? (안시 관측)]\n타이밍을 맞추어 대구경 망원경으로 남극 지평선 끝자락을 조준하십시오. 완만한 곡선을 그려야 할 달의 남극 가장자리가 상식을 깨고 날카로운 톱니바퀴나 톱날처럼 삐죽삐죽하고 거칠게 우주 공간으로 돌출되어 있는 압도적인 산맥의 실루엣을 감상하세요.\n[사진 촬영 팁]\n고속 럭키 이미징으로 실루엣을 캡처한 뒤, 선명도를 강하게 주는 언샤프 마스크 필터를 적용하면 지평선 위로 돌출된 톱날 산맥을 더욱 예리하게 만들 수 있습니다.", obs_en:"[Recommended Moon Age: South Libration]\n[Optimal Timing]\nThe key is when south libration peaks, tilting the moon upward to precariously reveal the far-side south pole.\n[What to look for? (Visual)]\nAim a large telescope at the extreme southern horizon. Watch as the normally gentle curve of the southern limb defies common sense, jaggedly and roughly protruding into space like a sharp saw-blade—the overwhelming silhouette of these massive mountains.\n[Astrophotography Tips]\nCapture the silhouette with high-speed Lucky Imaging, then apply a strong Unsharp Mask filter to make the saw-tooth mountains protruding above the horizon look even sharper."},
            {id:97, name:"인기라미 계곡 (Inghirami Valley)", sig:"쓸린 계곡", sig_en:"Swept Valley", lat:-44.0, lng:-73.0, diam:140, desc:"달의 남서쪽 가장자리에 위치한 방사형 계곡계입니다. 동방의 바다(Orientale Basin) 형성 시 뿜어진 수억 톤의 융융 파편들이 무서운 속도로 지면을 휩쓸며 빗자루로 쓸어내듯 표면을 굵직하게 파내어 만들어졌습니다.", desc_en:"A radial valley system on the SW limb. When the Orientale Basin formed, hundreds of millions of tons of molten debris swept the ground at terrifying speeds. Like a giant broom, it gouged the surface into thick destruction channels.", obs:"[추천 관측 월령: 13~14일경, 27~28일경]\n[최적의 관측 타이밍]\n보름달 전후로 조명각이 다소 존재하여 계곡의 파인 자국들이 선형의 그림자를 만들 때가 입체감을 파악하기 좋습니다.\n[무엇을 봐야 할까? (안시 관측)]\n오리엔탈레 분지가 위치한 북서쪽(우측 위)을 중심점으로 삼고, 이 계곡계가 남서쪽(좌측 아래)을 향해 방사상으로 시원하게 뻗어 나가는 방향성을 100배율 내외로 관측하십시오. 밑에 깔려 있던 오래된 크레이터들의 테두리를 가차 없이 무시하고 일관된 직선으로 표면을 짓이겨 놓은 강력한 운동 에너지를 확인하십시오.\n[사진 촬영 팁]\n파편이 날아간 방향을 화각의 대각선에 일치되도록 구도를 회전하여 촬영하면, 우주적 파괴 에너지의 역동성을 한층 드라마틱하게 표현할 수 있습니다.", obs_en:"[Recommended Moon Age: 13~14 days, 27~28 days]\n[Optimal Timing]\nAround full moon when some lighting angle still exists so the gouged tracks cast linear shadows, making 3D relief easier to grasp.\n[What to look for? (Visual)]\nUse Orientale to the NW (top right) as a center point, and observe at ~100x how this valley system cleanly radiates SW (bottom left). Confirm the immense kinetic energy that mercilessly ignored underlying ancient crater rims, uniformly mashing the surface in straight lines.\n[Astrophotography Tips]\nRotate your framing so the direction of the flying debris aligns diagonally across the shot; this dramatically emphasizes the dynamism of the cosmic destructive energy."},
            {id:98, name:"비의 바다 용암층 (Imbrium Lava Flows)", sig:"용암 경계면", sig_en:"Lava Flow Fronts", lat:32.8, lng:-22.0, diam:200, desc:"비의 바다 서쪽 중앙 평면에 광범위하게 퍼져 있는 화산 지형입니다. 과거 점성이 각기 다른 막대한 양의 현무암 용암 쓰나미가 여러 차례 범람하면서 파도가 해변에 밀려와 층층이 얼어붙은 듯한 10~30m 높이의 얕은 단차(Flow Fronts)를 형성했습니다.", desc_en:"Widespread volcanic terrain in western Mare Imbrium. Massive basaltic lava tsunamis flooded the area multiple times. They froze in layers, creating a massive band of lava flow fronts with shallow 10-30m step-like elevation changes, like frozen waves on a beach.", obs:"[추천 관측 월령: 9일경, 23일경]\n[최적의 관측 타이밍]\n단차가 고작 10~30m 수준으로 달 표면 지형 중 가장 낮습니다. 극강의 사선광이 비추는 찰나의 일출/일몰 순간에만 미세한 그림자를 던집니다.\n[무엇을 봐야 할까? (안시 관측)]\n대기가 매우 고요한 날 200배 이상의 고배율과 예리한 콘트라스트를 지닌 망원경을 사용하십시오. 아무것도 없어 보이는 바다 중앙 평원에서, 물결 모양으로 미세하게 겹쳐 쌓인 여러 겹의 얕은 용암 단차 선을 기적처럼 잡아내는 환희를 느껴보십시오.\n[사진 촬영 팁]\n빛 반사율과 그림자가 매우 약한 타겟입니다. 단차 부위의 디테일을 증폭시키기 위해 웨이블릿(Wavelet) 레이어의 첫 번째와 두 번째 미세 반경(Fine Detail) 영역 값을 집중적으로 올려주십시오.", obs_en:"[Recommended Moon Age: 9 days, 23 days]\n[Optimal Timing]\nWith elevation changes of only 10-30m, it's among the lowest features on the moon. It casts micro-shadows only under extreme grazing light at the exact moment of sunrise/sunset.\n[What to look for? (Visual)]\nOn a night of dead-calm seeing, use a high-contrast telescope at 200x+. Feel the miraculous joy of picking out the fine, wavy, overlapping lines of shallow lava steps in the seemingly empty central mare plain.\n[Astrophotography Tips]\nA target with very weak reflectivity and shadows. To amplify the flow front details, intensively boost the first and second fine-detail layers (small radius) in your Wavelet processing."},
            {id:99, name:"이나 (Ina)", sig:"가스 배출구", sig_en:"Gas Vent", lat:18.6, lng:5.3, diam:3, desc:"달 표면에서 가장 기괴한 직경 3km의 D자 모양 함몰 구조(Caldera)입니다. 내부에 거품이 터진 듯한 미세 구릉들이 존재하며, 불과 수천만 년 전(달의 기준으론 어제)까지 화산 가스가 뿜어져 나온 최신 지질 활동의 흔적으로 추정되는 미스터리 구역입니다.", desc_en:"The most bizarre feature on the moon: a D-shaped caldera 3km long. Inside, it has tiny hills looking like popped bubbles. Strongly believed to be a mystery zone of extremely recent geological activity, venting volcanic gas just tens of millions of years ago.", obs:"[추천 관측 월령: 6~7일경, 20~21일경]\n[최적의 관측 타이밍]\n명암 경계선이 살짝 스치고 지나가는 상/하현달 부근을 노려야 3km짜리 함몰 구조물 안에 미세한 음영이 생겨 식별이 가능해집니다.\n[무엇을 봐야 할까? (안시 관측)]\n지상 아마추어 망원경으로는 전체적인 3km 윤곽(밝은 반점)을 분해해 내는 것조차 불가능에 가까운 Lunar 100 최고의 극악 난이도 타겟입니다. 행복의 호수(Lacus Felicitatis) 지역에 대구경 망원경을 조준하고, 이 미스터리한 거품 지형이 자리 잡고 있는 정확한 위치의 좌표 점을 찍어내는 스타 호핑(Star Hopping)에 도전하세요.\n[사진 촬영 팁]\n시상이 완벽하게 협조해 주는 1년에 단 며칠뿐인 날, 12인치 이상의 대구경으로 3배 바로우 렌즈와 적외선 필터를 결합하여 극한의 분해능 럭키 이미징 촬영을 시도하십시오.", obs_en:"[Recommended Moon Age: 6~7 days, 20~21 days]\n[Optimal Timing]\nYou must target the quarter moon phases when the terminator just grazes by, allowing fine shadows to form inside the 3km depression to make it identifiable.\n[What to look for? (Visual)]\nThe ultimate extreme-difficulty target of the Lunar 100. Resolving even its 3km overall outline is nearly impossible visually. Aim a large aperture at the Lacus Felicitatis region, and challenge yourself to 'star hop' to pinpoint the exact coordinate dot where this mysterious bubble terrain resides.\n[Astrophotography Tips]\nOn the few days a year when seeing perfectly cooperates, use a 12-inch+ aperture, a 3x Barlow, and an IR filter to attempt extreme-resolution Lucky Imaging."},
            {id:100, name:"경계의 바다 소용돌이 (Mare Marginis Swirls)", sig:"자기장 무늬", sig_en:"Magnetic Swirls", lat:18.5, lng:88.0, diam:100, desc:"달 동쪽 지평선 너머 어두운 '경계의 바다(Mare Marginis)' 평면 위에 구름이나 뱀처럼 기이하게 퍼져 있는 하얀 소용돌이(Lunar Swirl) 패턴입니다. 이 지역 지각 아래의 강력한 자기장 우산이 우주 풍화를 막아주어 고대의 밝은 토양 빛깔을 그대로 유지하고 있습니다.", desc_en:"Bright, white swirl patterns strangely spreading like puffy clouds over the dark plains of 'Mare Marginis' beyond the eastern horizon. A strong underground magnetic umbrella blocks space weathering, mysteriously preserving the ancient bright soil color.", obs:"[추천 관측 월령: 동쪽 칭동 최대 시]\n[최적의 관측 타이밍]\n달의 칭동이 동쪽으로 극대화되는 날과 그림자가 소멸하는 보름달 시기가 완벽하게 겹치는, 수학적으로 드문 쾌청한 밤을 1년 내내 기다려야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n타이밍이 맞을 때, 100~150배율을 사용하여 지평선 너머 어두운 바다의 검은 캔버스 위를 조준하십시오. 어두운 평원 위로 뜬구름이나 밝은 연기처럼 희미하게 둥둥 떠서 퍼져 있는 하얀 얼룩 반점 무늬들을 찾아내는 끈기를 발휘하는 것이 Lunar 100 챌린지의 화려한 마지막 장식입니다.\n[사진 촬영 팁]\n카메라 센서의 노이즈가 지평선 관측의 방해물이 되므로, 광대역 컬러 촬영보다는 모노(흑백) 카메라를 이용해 L(루미넌스) 채널 데이터만 수만 장 스태킹하여 소용돌이 텍스처를 노이즈 없이 부드럽게 복원해 내십시오.", obs_en:"[Recommended Moon Age: Max East Libration]\n[Optimal Timing]\nYou must wait all year for mathematically rare, clear nights when maximal eastern libration perfectly aligns with the full moon phase (when shadows vanish).\n[What to look for? (Visual)]\nWhen timing aligns, use 100-150x to aim at the black canvas of the dark mare beyond the horizon. Exercise your perseverance to spot the faint white mottled patterns spreading like floating clouds or bright smoke over the dark plain—a spectacular finale to the Lunar 100 Challenge.\n[Astrophotography Tips]\nSensor noise will hinder limb observation. Instead of broadband color, use a mono camera to stack tens of thousands of frames of L (Luminance) channel data to smoothly restore the swirl texture without noise."}
        ];

        let observedData = JSON.parse(localStorage.getItem('lunarObserved_v19')) || {};
        let currentItem = null;
        let isFeatureSelected = false; 
        let todayAgeFilter = ""; 
        let currentMoonAge = 0; // 글로벌 월령 변수 추가

        function saveObservation() {
            localStorage.setItem('lunarObserved_v19', JSON.stringify(observedData));
            updateProgress();
        }

        function updateStaticUI() {
            document.getElementById('searchInput').placeholder = uiText[currentLang].search;
            const filter = document.getElementById('moonAgeFilter');
            filter.options[0].text = uiText[currentLang].allPhases; filter.options[1].text = uiText[currentLang].waxingCrescent;
            filter.options[2].text = uiText[currentLang].firstQuarter; filter.options[3].text = uiText[currentLang].gibbous;
            filter.options[4].text = uiText[currentLang].fullMoon; filter.options[5].text = uiText[currentLang].waningGibbous;
            filter.options[6].text = uiText[currentLang].lastQuarter; filter.options[7].text = uiText[currentLang].waningCrescent;
            filter.options[8].text = uiText[currentLang].special;
            
            document.getElementById('backBtnText').innerText = uiText[currentLang].back;
            document.getElementById('obsBtnText').innerText = uiText[currentLang].observe;
            document.getElementById('infoMoonAgeLabel').innerText = uiText[currentLang].moonAge;
            document.getElementById('infoMagLabel').innerText = uiText[currentLang].recMag;
            document.getElementById('guideTitleText').innerText = uiText[currentLang].guideTitle;
            document.getElementById('infoCoordsLabel').innerText = uiText[currentLang].coords;
            document.getElementById('infoDiamLabel').innerText = uiText[currentLang].diam;
            document.getElementById('refTitleText').innerText = uiText[currentLang].refTitle;
            
            document.querySelectorAll('.diff-label').forEach(el => el.innerText = uiText[currentLang].difficulty);
            document.getElementById('markerToggleTextMobile').innerText = uiText[currentLang].markerMobile;

            document.getElementById('helpModalTitle').innerHTML = `
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" class="text-blue-600"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>${uiText[currentLang].helpModalTitle}</span>`;
            document.getElementById('helpModalContent').innerHTML = uiText[currentLang].helpModalHtml;

            updateProgress();
        }

        function changeLanguage(lang) {
            currentLang = lang; updateStaticUI(); initMoonAge(); renderList(); 
            if (currentItem) focusItem(currentItem); else updateCenterCoords(); 
        }

        function openHelpModal() {
            const modal = document.getElementById('helpModal'); const inner = document.getElementById('helpModalInner');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); inner.classList.remove('scale-95'); inner.classList.add('scale-100'); }, 10);
        }

        function closeHelpModal() {
            const modal = document.getElementById('helpModal'); const inner = document.getElementById('helpModalInner');
            modal.classList.add('opacity-0'); inner.classList.remove('scale-100'); inner.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function updateProgress() {
            const count = Object.values(observedData).filter(v => v === true).length;
            document.getElementById('progressText').innerText = `${count} / 100 ${uiText[currentLang].progress}`;
            document.getElementById('progressBar').style.width = `${count}%`;
        }

        function toggleObservation(id, event) {
            if(event) event.stopPropagation(); 
            observedData[id] = !observedData[id]; saveObservation();
            const btn = document.getElementById(`check-${id}`); const card = document.getElementById(`card-${id}`);
            if (observedData[id]) { btn.classList.add('checked'); btn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>'; card.classList.add('observed'); } 
            else { btn.classList.remove('checked'); btn.innerHTML = ''; card.classList.remove('observed'); }
            if (markers[id]) {
                markers[id].setIcon(L.divIcon({ className: 'custom-lunar-marker', html: `<div class="${observedData[id] ? 'observed' : ''}">L${id}</div>`, iconSize: [0, 0] }));
                if (currentItem && currentItem.id === id) markers[id].setOpacity(0);
            }
            if (currentItem && currentItem.id === id) syncInfoPanelCheck();
        }

        function toggleObservationFromInfo() { if (currentItem) toggleObservation(currentItem.id); }

        function syncInfoPanelCheck() {
            const infoBtn = document.getElementById('infoCheckBtn');
            if (observedData[currentItem.id]) { infoBtn.classList.add('checked'); infoBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>'; } 
            else { infoBtn.classList.remove('checked'); infoBtn.innerHTML = ''; }
        }

        const L_SCALE = 40075017 / 10917000;

        function initMoonAge() {
            const today = new Date(); const year = today.getFullYear(); const month = today.getMonth() + 1; const day = today.getDate();
            const daysArrKo = ['일', '월', '화', '수', '목', '금', '토']; const daysArrEn = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dayName = currentLang === 'ko' ? daysArrKo[today.getDay()] : daysArrEn[today.getDay()];
            
            let dateStrDesktop, dateStrMobile;
            if (currentLang === 'ko') { dateStrDesktop = `${year}. ${month}. ${day}. (${dayName})`; dateStrMobile = `${String(year).slice(-2)}. ${month}. ${day}.`; } 
            else { const monthsEn = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']; dateStrDesktop = `${monthsEn[month-1]} ${day}, ${year} (${dayName})`; dateStrMobile = `${monthsEn[month-1]} ${day}, '${String(year).slice(-2)}`; }

            const lat = 37.5665; const lng = 126.9780; let riseStr = '--:--'; let setStr = '--:--';
            if (typeof SunCalc !== 'undefined') {
                const times = SunCalc.getMoonTimes(today, lat, lng);
                const formatTime = (d) => (!d || isNaN(d)) ? '--:--' : `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                riseStr = formatTime(times.rise); setStr = formatTime(times.set);
            }

            document.getElementById('moonRiseSet').innerHTML = `<span class="text-amber-400 mr-[1px]">▲</span>${riseStr} <span class="text-blue-400 ml-1 mr-[1px]">▼</span>${setStr}`;

            const synodicMonth = 29.53058867; const newMoonDate = new Date('2000-01-06T18:14:00Z').getTime(); 
            const targetTime = new Date(year, today.getMonth(), today.getDate(), 12, 0, 0).getTime();
            let age = ((targetTime - newMoonDate) / (1000 * 60 * 60 * 24)) % synodicMonth; if (age < 0) age += synodicMonth;
            
            currentMoonAge = age; // 정확한 월령 값 저장
            
            let icon = ''; let rDay = Math.round(age);
            if (age < 1.8 || age > 27.7) icon = '🌑'; else if (age < 5.5) icon = '🌒'; else if (age < 9.2) icon = '🌓'; 
            else if (age < 12.9) icon = '🌔'; else if (age < 16.6) icon = '🌕'; else if (age < 20.3) icon = '🌖'; 
            else if (age < 24.0) icon = '🌗'; else icon = '🌘'; 
            
            if (rDay >= 2 && rDay <= 5) todayAgeFilter = "초승달"; else if (rDay >= 6 && rDay <= 9) todayAgeFilter = "상현달";
            else if (rDay >= 10 && rDay <= 13) todayAgeFilter = "보름접근"; else if (rDay >= 14 && rDay <= 15) todayAgeFilter = "보름";
            else if (rDay >= 16 && rDay <= 19) todayAgeFilter = "보름직후"; else if (rDay >= 20 && rDay <= 24) todayAgeFilter = "하현달";
            else if (rDay >= 25 && rDay <= 28) todayAgeFilter = "그믐달"; else todayAgeFilter = "삭"; 
            
            document.getElementById('dateStrMobile').innerText = dateStrMobile; document.getElementById('dateStrDesktop').innerText = dateStrDesktop;
            document.getElementById('moonIconDisplay').innerText = icon; document.getElementById('moonAgeDisplay').innerText = currentLang === 'ko' ? `${age.toFixed(1)}일` : `${age.toFixed(1)}d`;
        }

        function getOptimalZoom(diam) {
            if (!diam || diam === 0) return 3;
            const requiredZoom = Math.log2((10917 / 256) * 180 / diam);
            return Math.max(3, Math.min(5, Math.round(requiredZoom)));
        }

        function getMainMapZoom(diam, id) { if (id <= 3 || diam >= 800) return 3; if (diam >= 400) return 4; if (diam >= 150) return 5; return 6; }

        function focusItem(item) {
            currentItem = item; isFeatureSelected = true; 
            if (activeHighlight) { map.removeLayer(activeHighlight); activeHighlight = null; }
            Object.values(markers).forEach(m => m.setOpacity(0.6));

            // 정규식을 사용하여 3가지 챕터(타이밍, 안시, 사진)를 완벽하게 파싱
            const moonAgeMatch = obsText.match(/\[(?:추천 관측 월령|Recommended Moon Age):\s*(.*?)\]/);
            const timingMatch = obsText.match(/\[(?:최적의 관측 타이밍|Optimal Timing)\]\n([\s\S]*?)\n\[(?:무엇을 봐야 할까\? \(안시 관측\)|What to look for\? \(Visual\))\]/);
            const visualMatch = obsText.match(/\[(?:무엇을 봐야 할까\? \(안시 관측\)|What to look for\? \(Visual\))\]\n([\s\S]*?)\n\[(?:사진 촬영 팁|Astrophotography Tips)\]/);
            const photoMatch = obsText.match(/\[(?:사진 촬영 팁|Astrophotography Tips)\]\n([\s\S]*)$/);
            
            if (moonAgeMatch) {
                document.getElementById('infoMoonAgeText').innerText = moonAgeMatch[1]; document.getElementById('infoMoonAge').classList.remove('hidden');
                
                let guideHtml = '';
                const hStyle = "font-black text-[13px] text-blue-700 flex items-center gap-1 mt-3 mb-1.5";

                if (timingMatch) guideHtml += `<div class="${bgStyle}"><h5 class="${hStyle}">⏱️ ${currentLang === 'ko' ? '최적의 관측 타이밍' : 'Optimal Timing'}</h5><p class="${pStyle}">${timingMatch[1].trim().replace(/\n/g, '<br>')}</p></div>`;
                if (visualMatch) guideHtml += `<div class="${bgStyle} mt-2"><h5 class="${hStyle}">👀 ${currentLang === 'ko' ? '무엇을 봐야 할까?' : 'What to look for?'}</h5><p class="${pStyle}">${visualMatch[1].trim().replace(/\n/g, '<br>')}</p></div>`;
                if (photoMatch) guideHtml += `<div class="${bgStyle} mt-2"><h5 class="${hStyle}">📸 ${currentLang === 'ko' ? '사진 촬영 팁' : 'Astrophotography Tips'}</h5><p class="${pStyle}">${photoMatch[1].trim().replace(/\n/g, '<br>')}</p></div>`;
                
                // 파싱에 실패할 경우 (기존 형식 데이터 대비용)

            document.getElementById('infoLinks').innerHTML = `
                <a href="${wikiUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white hover:bg-slate-50 text-slate-700 text-[11.5px] sm:text-xs font-bold rounded-lg transition-colors border border-slate-200 shadow-sm">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="text-slate-600"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zM11 19.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.22.23-1.8L9 15v1c0 1.1.9 2 2 2v1.93zm5.9-2.56c-.52-.61-1.3-1.02-2.16-1.12l-.54-.06V14h-1.4l-.56-1.12c-.22-.44-.68-.72-1.17-.72H9v-1h2.5c.83 0 1.5-.67 1.5-1.5v-1h2c1.1 0 2-.9 2-2v-1.1c1.9 1.48 3.1 3.73 3.1 6.32 0 2.5-.95 4.8-2.5 6.44z"/></svg>
                    ${uiText[currentLang].wikiLink}
                </a>
                <a href="${googleUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-white hover:bg-slate-50 text-slate-400 text-[11.5px] sm:text-xs font-bold rounded-lg transition-colors border border-slate-100 shadow-sm">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    ${uiText[currentLang].searchLink}
                </a>
            `;

            syncInfoPanelCheck();
            const detailView = document.getElementById('detail-view'); detailView.classList.add('active');
            const detailBody = document.getElementById('detailBodyContent');
            if (detailBody) { detailBody.classList.remove('fade-in'); void detailBody.offsetWidth; detailBody.classList.add('fade-in'); detailBody.scrollTop = 0; }
            
            setTimeout(() => { 
                if (miniMap && !item.img) {
                    miniMap.invalidateSize(); 
                    if (currentTargetBounds) {
                        miniMap.fitBounds(currentTargetBounds, { animate: false });
                    } else if (item.id <= 3) {
                        miniMap.setView([0, 0], 2, {animate: false});
                    }
                }
            }, 350); 
        }

        function resetApp() {
            // 1. 상세 화면 닫기 (열려있는 경우)
            if (currentItem) {
                backToList();
            } else {
                map.flyTo([0, 0], 3, { duration: 1.2 });
                setTimeout(updateCenterCoords, 1200);
            }

            // 2. 검색어 초기화
            document.getElementById('searchInput').value = '';

            // 3. 오늘 관측 토글 초기화
            const todayToggle = document.getElementById('todayFilterToggle');
            if (todayToggle.checked) {
                todayToggle.checked = false;
                const dropdown = document.getElementById('moonAgeFilter');
                dropdown.disabled = false; 
                dropdown.classList.remove('opacity-50', 'cursor-not-allowed');
            }

            // 4. 월령 필터 드롭다운 초기화
            document.getElementById('moonAgeFilter').value = '';

            // 5. 마커 토글 켜기 (꺼져있는 경우)
            const markerToggle = document.getElementById('markerToggle');
            if (!markerToggle.checked) {
                markerToggle.checked = true;
                map.addLayer(markerGroup);
            }

            // 6. 전체 리스트 렌더링 초기화
            filterList();
        }

        function backToList() {
            const container = document.getElementById('mediaContainer');
            if (container) container.classList.remove('fullscreen-mode');
            document.body.classList.remove('is-fullscreen'); // 목록 복귀 시 전체화면 상태 해제
            
            document.getElementById('detail-view').classList.remove('active'); currentItem = null; isFeatureSelected = false; 
            if (activeHighlight) { map.removeLayer(activeHighlight); activeHighlight = null; }
            Object.values(markers).forEach(m => m.setOpacity(1)); map.flyTo([0, 0], 3, { duration: 1.2 });
            setTimeout(updateCenterCoords, 1200);
        }

        function filterList() {
            const term = document.getElementById('searchInput').value.toLowerCase().replace(/\s/g, ''); const ageFilter = document.getElementById('moonAgeFilter').value;
            const cards = document.querySelectorAll('.lunar-card'); 
            
            cards.forEach(card => {
                const item = lunar100Data.find(d => d.id == card.id.replace('card-', '')); if (!item) return;
                const nameEnMatch = item.name.match(/\((.*?)\)/); const nameEn = nameEnMatch ? nameEnMatch[1].trim() : item.name.split('(')[0].trim();
                const displayName = currentLang === 'ko' ? item.name : nameEn; const displaySig = currentLang === 'ko' ? item.sig : item.sig_en;
                const textMatch = (displayName + displaySig).toLowerCase().replace(/\s/g, '').includes(term);
                
                let ageMatch = true;
                if (ageFilter) {
                    ageMatch = false; const obsStr = item.obs; 
                    if (obsStr.includes("전 월령")) ageMatch = true;
                    if (ageFilter === "칭동" && (obsStr.includes("칭동") || item.id <= 3)) ageMatch = true;
                    if (ageFilter === "보름" && obsStr.includes("보름")) ageMatch = true;
                    
                    const ranges = obsStr.match(/(\d+)~?(\d*)일경/g);
                    if (ranges) {
                        ranges.forEach(r => {
                            const m = r.match(/(\d+)~?(\d*)일경/); const d1 = parseInt(m[1]); const d2 = m[2] ? parseInt(m[2]) : d1;
                            if (ageFilter === "초승달" && ((d1 <= 5 && d2 >= 2) || (d1 <= 19 && d2 >= 16))) ageMatch = true;
                            if (ageFilter === "상현달" && ((d1 <= 9 && d2 >= 6) || (d1 <= 24 && d2 >= 20))) ageMatch = true;
                            if (ageFilter === "보름접근" && ((d1 <= 13 && d2 >= 10) || (d1 <= 28 && d2 >= 25))) ageMatch = true;
                            if (ageFilter === "보름" && ((d1 <= 15 && d2 >= 14))) ageMatch = true;
                            if (ageFilter === "보름직후" && ((d1 <= 19 && d2 >= 16) || (d1 <= 5 && d2 >= 2))) ageMatch = true;
                            if (ageFilter === "하현달" && ((d1 <= 24 && d2 >= 20) || (d1 <= 9 && d2 >= 6))) ageMatch = true;
                            if (ageFilter === "그믐달" && ((d1 <= 28 && d2 >= 25) || (d1 <= 13 && d2 >= 10))) ageMatch = true;
                        });
                    }
                }
                
                const isVisible = textMatch && ageMatch; card.style.display = isVisible ? 'flex' : 'none';
                if (isVisible) { if (!markerGroup.hasLayer(markers[item.id])) markerGroup.addLayer(markers[item.id]); } 
                else { if (markerGroup.hasLayer(markers[item.id])) markerGroup.removeLayer(markers[item.id]); }
            });

            if (shadowLayer) { map.removeLayer(shadowLayer); shadowLayer = null; }

            let rects = [];
            const isTodayChecked = document.getElementById('todayFilterToggle').checked;

            if (isTodayChecked) {
                // 정확한 일일 월령 그림자 렌더링 (소프트 엣지 그라데이션)
                const phase = currentMoonAge / 29.53058867;
                if (phase < 0.5) {
                    // 상현 방향 (오른쪽에서 빛이 차오름)
                    let term_lon = 90 - (phase * 360);
                    rects.push(L.rectangle([[-90, -180], [90, term_lon - 2]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false }));
                    rects.push(L.rectangle([[-90, term_lon - 2], [90, term_lon + 2]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.6, interactive: false }));
                    rects.push(L.rectangle([[-90, term_lon + 2], [90, term_lon + 6]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.3, interactive: false }));
                    rects.push(L.rectangle([[-90, term_lon + 6], [90, term_lon + 10]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.1, interactive: false }));
                } else {
                    // 하현 방향 (오른쪽부터 어두워짐)
                    let term_lon = 270 - (phase * 360);
                    rects.push(L.rectangle([[-90, term_lon + 2], [90, 180]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false }));
                    rects.push(L.rectangle([[-90, term_lon - 2], [90, term_lon + 2]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.6, interactive: false }));
                    rects.push(L.rectangle([[-90, term_lon - 6], [90, term_lon - 2]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.3, interactive: false }));
                    rects.push(L.rectangle([[-90, term_lon - 10], [90, term_lon - 6]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.1, interactive: false }));
                }
            } else {
                // 기존의 대략적인 필터별 그림자
                if (ageFilter === "초승달") { rects.push(L.rectangle([[-90, -180], [90, 30]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false })); rects.push(L.rectangle([[-90, 30], [90, 70]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.35, interactive: false })); } 
                else if (ageFilter === "상현달") { rects.push(L.rectangle([[-90, -180], [90, -20]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false })); rects.push(L.rectangle([[-90, -20], [90, 30]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.35, interactive: false })); } 
                else if (ageFilter === "보름접근") { rects.push(L.rectangle([[-90, -180], [90, -70]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false })); rects.push(L.rectangle([[-90, -70], [90, -20]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.35, interactive: false })); } 
                else if (ageFilter === "보름직후") { rects.push(L.rectangle([[-90, 70], [90, 180]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false })); rects.push(L.rectangle([[-90, 30], [90, 70]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.35, interactive: false })); } 
                else if (ageFilter === "하현달") { rects.push(L.rectangle([[-90, 20], [90, 180]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false })); rects.push(L.rectangle([[-90, -30], [90, 20]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.35, interactive: false })); } 
                else if (ageFilter === "그믐달") { rects.push(L.rectangle([[-90, -30], [90, 180]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false })); rects.push(L.rectangle([[-90, -80], [90, -30]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.35, interactive: false })); } 
                else if (ageFilter === "삭") { rects.push(L.rectangle([[-90, -180], [90, 180]], { color: 'transparent', fillColor: '#000000', fillOpacity: 0.85, interactive: false })); }
            }

            if (rects.length > 0) shadowLayer = L.layerGroup(rects).addTo(map);
        }

        document.getElementById('searchInput').addEventListener('input', filterList);
        document.getElementById('moonAgeFilter').addEventListener('change', filterList);

        function updateCenterCoords() {
            if (!isFeatureSelected) {
                const center = map.getCenter(); const zoom = map.getZoom();
                const coordsTextShort = formatLunarCoords(center.lat, center.lng);
                const prefix = currentLang === 'ko' ? "월면좌표: " : "Lunar Coords: ";
                document.getElementById('coordDisplay').innerText = `${prefix}${coordsTextShort} | ${uiText[currentLang].zoom} ${zoom.toFixed(1)}`;
            }
        }

        map.on('dragstart', () => { isFeatureSelected = false; });
        map.on('move', updateCenterCoords); map.on('zoom', updateCenterCoords);

        function initApp() { changeLanguage('ko'); }

        window.onload = initApp;
    </script>
</body>
</html>
