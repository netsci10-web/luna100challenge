            {id:40, name:"얀센 릴 (Janssen Rille)", sig:"고지대 릴", sig_en:"Highland Rille", lat:-45.4, lng:39.3, diam:190, desc:"가혹한 운석 폭격으로 형태가 크게 뭉개진 고지대의 얀센 크레이터 바닥을 깊게 파고 흐르는 대규모 릴입니다. 거친 고지대 한가운데서 릴이 발견되는 희귀한 지질학적 특징을 가집니다.", desc_en:"A massive rille cutting deep into the degraded floor of Janssen crater. It is geologically rare because rilles typically form in maria, but this is found smack in the middle of the rough highlands.", obs:"[추천 관측 월령: 4~5일경, 18~19일경]\n[최적의 관측 타이밍]\n명암 경계선이 얀센 크레이터를 통과하여 거친 고지대 계곡 속으로 깊고 짙은 그림자가 깔리는 4일경 일출 시기가 완벽합니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배 이상의 대구경 망원경을 사용하여 훼손된 얀센 분화구 내부 바닥을 조준하세요. 거칠고 복잡한 잔해들을 뚫고 초승달처럼 유려하게 깊은 곡선을 그리며 관통하는 협곡의 기하학적 웅장함을 찾아보십시오.\n[사진 촬영 팁]\n릴 뿐만 아니라 얀센 북쪽 벽을 무자비하게 파괴하고 들어선 훨씬 젊고 뚜렷한 파브리시우스(Fabricius) 크레이터의 대비되는 질감을 함께 담는 앵글을 추천합니다.", obs_en:"[Recommended Moon Age: 4~5 days, 18~19 days]\n[Optimal Timing]\nPerfect around day 4 (sunrise) when the terminator crosses Janssen, casting deep, thick shadows into the rough highland valley.\n[What to look for? (Visual)]\nAim a large aperture at 150x+ at the ruined floor. Look for the geometric majesty of the gorge carving a deep, elegant crescent curve right through the chaotic, rough debris.\n[Astrophotography Tips]\nFrame the shot to contrast the rille with the much younger, sharply defined Fabricius crater that ruthlessly smashed into Janssen's northern wall."},
            {id:41, name:"베셀 광조 (Bessel Ray)", sig:"기원 불명", sig_en:"Mysterious Ray", lat:21.8, lng:17.9, diam:50, desc:"맑음의 바다 중앙을 남북으로 완벽하게 직선으로 가로지르는 길고 뚜렷한 미스터리 백색 광조입니다. 베셀 크레이터를 관통할 뿐 기원한 것은 아니며 튀코 크레이터에서 날아왔다는 가설이 유력합니다.", desc_en:"A long, distinct, mysterious white ray slicing perfectly straight north-south through Mare Serenitatis. It merely passes through Bessel crater; the leading hypothesis is that it flew all the way from Tycho.", obs:"[추천 관측 월령: 14일경, 보름]\n[최적의 관측 타이밍]\n조명각이 수직으로 떨어져 지형의 그림자가 모두 소멸하고 오직 반사율(Albedo)만 극도로 강조되는 보름달 시기에 관측해야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n어두운 현무암 바다 한가운데를 하얀 분필로 자를 대고 일직선으로 그어놓은 듯한 선형 광조의 신비로운 궤적을 저배율에서부터 중배율까지 스윕하며 끝에서 끝까지 따라가 보십시오.\n[사진 촬영 팁]\n광조의 하얀 선이 흐릿하게 번지지 않도록 대기 굴절에 의한 색수차를 ADC(대기 분산 보정기)로 철저하게 제어한 후 촬영하는 것이 핵심입니다.", obs_en:"[Recommended Moon Age: 14 days, Full Moon]\n[Optimal Timing]\nMust be observed at full moon when lighting is vertical, erasing topographical shadows and pushing albedo (reflectivity) contrast to the extreme.\n[What to look for? (Visual)]\nSweep from low to medium power to trace the mysterious trajectory of this linear ray from end to end, looking like a straight white chalk line drawn across the dark basaltic sea.\n[Astrophotography Tips]\nTo prevent the white line from blurring, strictly control atmospheric chromatic dispersion using an ADC (Atmospheric Dispersion Corrector) before imaging."},
            {id:42, name:"마리우스 언덕 (Marius Hills)", sig:"화산 군락", sig_en:"Volcanic Domes", lat:12.5, lng:-54.0, diam:125, desc:"폭풍의 대양 서쪽에 300개가 넘는 다양한 크기의 화산 돔과 구릉이 빽빽하게 밀집해 있는 달 최대의 화산 융기 중심 구역입니다. 점성이 낮은 용암이 조용히 솟아올라 수백 미터 높이의 완만한 쉴드 화산들을 형성했습니다.", desc_en:"The moon's largest volcanic uplift center, densely packed with over 300 volcanic domes and hills. Low-viscosity lava quietly oozed here, forming a vast cluster of gentle, few-hundred-meter-high shield volcanoes.", obs:"[추천 관측 월령: 12~13일경, 26~27일경]\n[최적의 관측 타이밍]\n돔들의 경사가 고작 2~3도에 불과해 태양이 조금만 높아져도 완전히 사라집니다. 명암 경계선이 닿는 일출/일몰 직전 단 1~2시간의 매직 아워를 노리십시오.\n[무엇을 봐야 할까? (안시 관측)]\n타이밍을 맞추어 대구경 200배율 이상을 장착하면, 평평한 바다 평원 위로 여드름처럼 오돌토돌 솟아난 수백 개의 작은 돔들이 소름 돋는 질감을 뽐내며 마술처럼 드러나는 장관을 목격할 수 있습니다.\n[사진 촬영 팁]\n그림자의 길이가 극단적으로 길어지는 얕은 조명각 하에서 화산 돔 군락 전체의 소름 돋는 질감을 고속 럭키 이미징으로 와이드하게 담아보세요.", obs_en:"[Recommended Moon Age: 12~13 days, 26~27 days]\n[Optimal Timing]\nWith slopes of only 2-3 degrees, they vanish if the sun rises. Target the 1-2 hour magic window exactly at sunrise/sunset when the terminator touches them.\n[What to look for? (Visual)]\nNail the timing with a large aperture at 200x+, and you'll witness the magic: hundreds of pimple-like domes popping out from the flat plain with goosebump-inducing textures.\n[Astrophotography Tips]\nUnder extreme shallow lighting casting long shadows, use wide-field Lucky Imaging to capture the eerie, bumpy texture of the entire volcanic dome cluster."},
            {id:43, name:"바르겐틴 (Wargentin)", sig:"용암 고원", sig_en:"Lava Plateau", lat:-49.6, lng:-60.2, diam:84, desc:"통상적인 오목한 크레이터의 상식을 깨는 '역전형(Inverted)' 분화구입니다. 막대한 양의 용암이 테두리 벽을 넘어 쏟아지기 직전인 찰나에 꽉 채워진 채로 굳어버려 원반 모양의 융기된 고원이 되었습니다.", desc_en:"A bizarre 'inverted' crater breaking the common concave sense. Massive lava rose and filled it to the absolute brim, freezing just before spilling over, forming a raised disc-like plateau.", obs:"[추천 관측 월령: 12~13일경, 26~27일경]\n[최적의 관측 타이밍]\n명암 경계선의 그림자가 주변 평면에 길고 짙게 깔릴 때 관측해야 지형이 위로 볼록하게 솟아 있다는 입체감을 완벽히 체감할 수 있습니다.\n[무엇을 봐야 할까? (안시 관측)]\n인접한 나스미스나 쉬카르드 크레이터의 전형적인 '푹 파인 그릇 모양'과 대조하며 관찰하세요. 바르겐틴이 평원 위로 동전처럼 볼록하게 융기되어 있는 놀라운 시각적 반전을 150배율 이상의 뷰로 확인하는 것이 핵심입니다.\n[사진 촬영 팁]\n오목한 크레이터들과 볼록한 고원이 나란히 배치된 기묘한 지형적 모순을 한 프레임에 담아보는 것이 좋습니다.", obs_en:"[Recommended Moon Age: 12~13 days, 26~27 days]\n[Optimal Timing]\nObserve when the terminator casts long, thick shadows on the surrounding plains to perfectly feel the 3D illusion that the terrain bulges upward.\n[What to look for? (Visual)]\nContrast it with the typical 'concave bowl' shapes of adjacent Nasmyth or Schickard. The key is using 150x+ to witness the visual paradox of Wargentin rising like a convex coin above the plains.\n[Astrophotography Tips]\nFrame the shot to include both the concave craters and the convex plateau side-by-side to highlight this bizarre topographical contradiction."},
            {id:44, name:"메르세니우스 (Mersenius)", sig:"볼록한 바닥", sig_en:"Bowed Floor", lat:-21.5, lng:-49.2, diam:84, desc:"습기의 바다 서쪽 가장자리에 위치한 크레이터입니다. 화산 활동 여파로 지하에 마그마 굄층이 생성되었고, 이 압력이 위로 뻗치면서 크레이터 바닥 전체가 풍선처럼 돔 형태로 불룩하게 부풀어 올랐습니다.", desc_en:"An 84km crater. A subsurface magma chamber grew beneath it, and the upward pressure bowed the entire crater floor upwards into a convex dome, like an inflated balloon.", obs:"[추천 관측 월령: 11일경, 25일경]\n[최적의 관측 타이밍]\n바닥이 부풀어 오른 입체감은 정면 조명에선 볼 수 없습니다. 명암 경계선이 정확히 메르세니우스를 지나는 아주 얕은 사선광 타이밍을 잡아야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n크레이터 외벽 테두리 산맥이 내부에 드리우는 그림자의 경계선을 150배 이상의 배율로 집중 관측하세요. 그림자 선이 일직선으로 떨어지지 않고 바닥의 불룩한 곡면을 타고 둥글게 왜곡되어 그려지는 시각 효과를 통해 바닥의 볼록함을 100% 체감할 수 있습니다.\n[사진 촬영 팁]\n왜곡된 그림자 라인의 곡선을 극명하게 보여줄 수 있도록, 샤프닝 단계에서 하이라이트가 타지 않게 명암 디테일을 섬세하게 끌어올리세요.", obs_en:"[Recommended Moon Age: 11 days, 25 days]\n[Optimal Timing]\nThe bulging 3D floor is invisible under direct light. You must catch the extremely shallow slanted lighting exactly when the terminator crosses Mersenius.\n[What to look for? (Visual)]\nFocus on the shadow line cast by the outer rim onto the interior at 150x+. You'll 100% feel the floor's convexity by seeing how the shadow line doesn't fall flat but distorts and curves over the bulging surface.\n[Astrophotography Tips]\nTo distinctly show the curved distortion of the shadow line, delicately boost shadow detail during sharpening without blowing out the highlights."},
            {id:45, name:"모로리쿠스 (Maurolycus)", sig:"중첩 충돌", sig_en:"Overlapping Impacts", lat:-42.0, lng:14.0, diam:114, desc:"남부 고지대의 거칠고 혼란스러운 달의 초기 역사를 증명하는 극도로 포화된 충돌 지대입니다. 무수한 후속 충돌이 빗발쳐 분화구들이 서로의 성벽을 갉아먹으며 겹겹이 겹쳐진 기괴한 형상을 띱니다.", desc_en:"A highly saturated impact zone demonstrating the moon's chaotic early history. Relentless subsequent impacts battered it, resulting in a bizarre mess where craters bite into and overlap one another in layers.", obs:"[추천 관측 월령: 6일경, 20일경]\n[최적의 관측 타이밍]\n상현 직전이나 하현 직후 달의 남반구에 복잡한 그림자가 가득 찰 때 겹쳐진 크레이터들의 윤곽이 가장 잘 드러납니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배 이상의 중고배율을 세팅한 후, 겹쳐진 분화구들의 테두리가 끊긴 형태를 단서로 삼아 어느 크레이터가 먼저 생기고 어떤 크레이터가 나중에 덮어썼는지 타임라인(Relative Dating)을 탐정처럼 추리해 보며 관측하는 것이 가장 흥미로운 포인트입니다.\n[사진 촬영 팁]\n지형이 극도로 혼란스럽고 밝기 대비가 심하므로, 럭키 이미징 촬영 후 후보정에서 Deconvolution 수치를 과하게 주면 노이즈가 폭발하므로 부드럽게 처리하는 것이 좋습니다.", obs_en:"[Recommended Moon Age: 6 days, 20 days]\n[Optimal Timing]\nOverlapping crater outlines are best revealed just before first quarter or after last quarter when the southern hemisphere is filled with complex shadows.\n[What to look for? (Visual)]\nSet up 150x+ magnification. The most fascinating part is playing detective: use the broken rims as clues to deduce the timeline (relative dating) of which craters formed first and which smashed over them later.\n[Astrophotography Tips]\nThe terrain is chaotic with harsh brightness contrasts. During post-processing after Lucky Imaging, avoid excessive Deconvolution which will explode noise; process it softly."},
            {id:46, name:"레기오몬타누스 픽 (Regiomontanus Peak)", sig:"화산성 봉우리", sig_en:"Volcanic Peak", lat:-28.0, lng:-0.6, diam:124, desc:"레기오몬타누스 크레이터 바닥 북쪽으로 크게 치우친 곳에 솟은 1,200m 높이의 산봉우리입니다. 충돌 반발력으로 생기는 중앙 봉우리와 달리 편심되어 있고, 정상에 화산 칼데라로 의심되는 5km 구덩이가 있습니다.", desc_en:"A 1,200m peak heavily offset to the north on Regiomontanus crater's floor. Unlike central impact rebound peaks, its eccentric location and a 5km summit pit fuel a strong volcanic caldera hypothesis.", obs:"[추천 관측 월령: 8일경, 22일경]\n[최적의 관측 타이밍]\n산봉우리의 입체감과 정상의 미세한 구덩이 안쪽으로 그림자가 지는 타이밍을 잡기 위해 상현이나 하현의 명암 경계선을 활용해야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n대기가 극도로 안정된 날 200배 이상의 고배율과 예리한 광학계 분해능을 동원하십시오. 길게 늘어지는 봉우리의 그림자를 확인하는 것을 넘어, 산봉우리 꼭대기 정중앙에 화구처럼 뚫려 있는 미세한 5km 흑점(화산성 칼데라)을 시각적으로 분해해 내는 한계 도전을 즐겨보세요.\n[사진 촬영 팁]\n안시로 확인하기 힘든 정상 구덩이의 완벽한 둥근 형태를 입증하기 위해, IR-Pass 685nm 이상의 적외선 대역을 활용하여 대기를 극복한 초고해상도 사진을 남겨보십시오.", obs_en:"[Recommended Moon Age: 8 days, 22 days]\n[Optimal Timing]\nUtilize the quarter moon terminator to catch both the 3D relief of the peak and the shadowing inside the tiny summit pit.\n[What to look for? (Visual)]\nRequires exceptionally steady seeing, 200x+ power, and sharp optics. Go beyond the peak's long shadow: enjoy the extreme challenge of visually resolving the tiny 5km dark pit (caldera) pierced right at the very summit.\n[Astrophotography Tips]\nTo prove the perfectly round shape of the summit pit (often too hard visually), shoot ultra-high-res photos using an IR-Pass 685nm+ filter to defeat atmospheric seeing."},
            {id:47, name:"알폰수스 암점 (Alphonsus Dark Spots)", sig:"화산재 분출", sig_en:"Dark Halo Spots", lat:-13.7, lng:-3.2, diam:119, desc:"알폰수스 크레이터 밝은 바닥 외곽을 따라 짙게 분포하는 3개의 뚜렷한 어두운 반점(Dark Halo)들입니다. 지반 균열을 통해 폭발적으로 뿜어져 나온 화쇄류와 검은 유리질 화산재가 퇴적된 흔적입니다.", desc_en:"Three distinct dark spots (Dark Halos) along the bright floor edge of Alphonsus crater. They are deposits of pyroclastic flows and black glassy volcanic ash erupted explosively through floor fractures.", obs:"[추천 관측 월령: 8~9일경, 22~23일경]\n[최적의 관측 타이밍]\n토양의 색상 차이를 극명하게 보려면 명암 경계선이 살짝 비켜가 그림자가 약간 물러난 시점에서 관측하는 것이 바닥의 밝기를 끌어올려 흑백 대비를 더 강하게 만듭니다.\n[무엇을 봐야 할까? (안시 관측)]\n하얀 바닥 평면 대비 먹물처럼 선명한 검은 반점 3개를 확인한 후, 배율을 200배 이상 최고로 올려 각 반점의 정중앙에 화산 분출구 역할을 했던 직경 1~2km 수준의 미세한 벤트(Vent) 구멍이 뚫려 있는 구조를 정밀 탐사해 보시기 바랍니다.\n[사진 촬영 팁]\n분출구 구멍(지형)과 검은 반점(알베도) 두 가지 특성을 모두 살려야 하므로, 럭키 이미징 스태킹 후 샤프닝과 대비(Contrast) 커브를 동시에 세밀하게 조절하십시오.", obs_en:"[Recommended Moon Age: 8~9 days, 22~23 days]\n[Optimal Timing]\nTo maximize soil color contrast, observe slightly after the terminator passes; lifting the shadow brightens the floor, boosting the black-and-white contrast.\n[What to look for? (Visual)]\nVerify the three ink-black spots against the white floor. Then, max out magnification (200x+) to deeply inspect and hunt for the tiny 1-2km vent holes pierced dead center in each halo, which acted as eruption sources.\n[Astrophotography Tips]\nSince you need to capture both the vent holes (topography) and the black spots (albedo), delicately adjust both wavelet sharpening and contrast curves post-stacking."},
            {id:48, name:"코시 지역 (Cauchy Region)", sig:"단층과 릴", sig_en:"Faults and Rilles", lat:10.5, lng:38.0, diam:130, desc:"직경 12km의 코시 분화구를 중앙에 두고, 북쪽에는 지각이 당겨져 파인 V자형 릴(Rima Cauchy)이, 남쪽에는 지반이 어긋나 밀려 올라간 가파른 절벽(Rupes Cauchy)이 기차 레일처럼 평행하게 달리는 지질 교과서입니다.", desc_en:"A geological textbook centered on the 12km Cauchy crater. A V-shaped tension rille (Rima Cauchy) runs to the north, while a steep thrust fault cliff (Rupes Cauchy) runs to the south, paralleling like train tracks.", obs:"[추천 관측 월령: 4~5일경, 18~19일경]\n[최적의 관측 타이밍]\n단층과 균열의 빛 반사 특성을 비교하기 위해 일출(4일)과 일몰(18일) 시기를 모두 관측하여 그림자가 반전되는 현상을 목격해야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배 이상의 배율로 빛의 마술을 비교하세요. 일출 시기에는 남쪽 단층 절벽이 짙은 그림자를 만들고 북쪽 릴이 하얗게 빛나지만, 일몰 시기에는 릴이 까맣게 파인 띠로 변하고 단층벽면이 햇빛을 정면으로 받아 하얗게 빛나는 반전을 감상하는 것이 핵심 포인트입니다.\n[사진 촬영 팁]\n철길처럼 나란히 달리는 이 두 지질학적 선형 구조물의 대비를 극대화하기 위해, 화각을 비스듬하게 틀어 선들이 프레임을 대각선으로 시원하게 가로지르도록 구도를 잡아보세요.", obs_en:"[Recommended Moon Age: 4~5 days, 18~19 days]\n[Optimal Timing]\nTo compare their light reflection traits, you must observe both at sunrise (day 4) and sunset (day 18) to witness the shadows inverting.\n[What to look for? (Visual)]\nUse 150x+ to compare the magic of light. At sunrise, the south fault casts a thick shadow while the north rille glows white. At sunset, it inverts: the rille becomes a dark band, and the fault face shines brilliantly white.\n[Astrophotography Tips]\nTo maximize the contrast of these parallel 'train track' linear structures, angle your camera frame so the lines slice dramatically diagonally across the image."},
            {id:49, name:"그루이투이젠 돔 (Gruithuisen Domes)", sig:"규산염 돔", sig_en:"Silicic Domes", lat:36.3, lng:-40.0, diam:20, desc:"물처럼 흐르는 일반적인 현무암 용암과 달리, 점성이 매우 끈적한 규산염(Silicic) 마그마가 밀려 올라와 사방으로 퍼지지 못하고 가파르게 굳어지며 형성된 뭉툭하고 볼록한 두 개의 돔(감마, 델타) 산입니다.", descen:"Unlike typical fluid basalt, highly viscous silicic magma pushed upwards here. Unable to spread widely, it solidified steeply, forming two unusually bulky and highly convex dome mountains (Gamma and Delta).", obs:"[추천 관측 월령: 11일경, 25일경]\n[최적의 관측 타이밍]\n일반 돔 화산들보다 경사가 훨씬 가파르기 때문에 명암 경계선이 살짝 지나간 시점에서도 우람한 덩어리감의 둥근 그림자가 꽤 오랫동안 시원하게 드리워집니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배 이상의 배율을 적용해 일반적인 달의 방패 화산(경사 2도 내외)들과 다른, 최대 20도에 달하는 가파르고 우람한 융기 덩어리감을 델타와 감마 두 산에서 느껴보세요. 정상부에 푹 파인 미세한 화구(Caldera) 흔적을 포착하는 것도 훌륭한 시도입니다.\n[사진 촬영 팁]\n두 화산 돔의 거친 질감과 볼록한 부피감을 강조하기 위해, 이미징 처리 시 미드톤 대비(Mid-tone Contrast)를 강하게 주면 돌출된 3D 느낌이 극대화됩니다.", obs_en:"[Recommended Moon Age: 11 days, 25 days]\n[Optimal Timing]\nBecause their slopes are much steeper than regular domes, they boldly cast bulky, rounded shadows for quite a while even after the terminator passes.\n[What to look for? (Visual)]\nApply 150x+ to feel the steep, bulky uplift mass reaching up to 20 degrees, unlike regular flat lunar shield volcanoes. Spotting the tiny caldera traces indented at their summits is an excellent challenge.\n[Astrophotography Tips]\nTo emphasize the rough texture and convex volume of these two domes, aggressively boost mid-tone contrast during processing to maximize the 3D pop-out effect."},
            {id:50, name:"케일리 평원 (Cayley Plains)", sig:"밝은 평원", sig_en:"Light Plains", lat:4.0, lng:15.1, diam:14, desc:"거칠고 운석 구덩이가 빼곡한 중앙 고지대 한가운데에 섬처럼 고립되어 비정상적으로 매끄럽게 펼쳐진 지형입니다. 거대 충돌 시 날아온 쇄설물들이 골짜기를 메워 형성된 '밝은 평원(Light Plains)'입니다.", desc_en:"An abnormally smooth terrain spreading like an isolated island amidst the rough central highlands. Formed by debris (breccia) from giant impacts filling the valleys, known as 'Light Plains'.", obs:"[추천 관측 월령: 6~7일경, 20~21일경]\n[최적의 관측 타이밍]\n고지대 특유의 거친 그림자가 가득 차오르는 명암 경계선 부근일 때, 그 사이에 호수처럼 깔린 평원의 텍스처 대비가 가장 강렬합니다.\n[무엇을 봐야 할까? (안시 관측)]\n프톨레마이오스 크레이터 동쪽 시야에서 100배율 내외로 세팅하십시오. 주변의 험준한 산맥과 구덩이들 사이를 뱀처럼 파고들며 평평하게 깔린 케일리 평원의 밝고 매끄러운 질감을 감상하며, 일반적인 어두운 바다(Mare) 평면과의 알베도(반사율) 톤 차이를 눈으로 직접 비교해 보십시오.\n[사진 촬영 팁]\n거친 고지대 질감을 살리면서 매끄러운 평원의 노이즈도 억제해야 하므로, 다중 해상도 웨이블릿(Multi-scale wavelet) 처리를 세심하게 조절해야 합니다.", obs_en:"[Recommended Moon Age: 6~7 days, 20~21 days]\n[Optimal Timing]\nNear the terminator when rough highland shadows abound; this maximizes the textural contrast of the flat, lake-like plain nestled between them.\n[What to look for? (Visual)]\nSet ~100x power east of Ptolemaeus. Appreciate the bright, smooth texture of the Cayley Plains snaking through the rugged mountains and pits. Visually compare its brighter albedo tone against the typical dark mare plains.\n[Astrophotography Tips]\nYou must preserve the rough highland texture while suppressing noise in the smooth plains. Adjust multi-scale wavelet sharpening meticulously to balance both terrains."},
            {id:51, name:"데비 크레이터 체인 (Davy Crater Chain)", sig:"혜성 파편", sig_en:"Comet Debris", lat:-11.1, lng:-6.6, diam:50, desc:"데비 Y 크레이터 바닥에서 시작해 동쪽 벽을 뚫고 고지대까지 약 50km 길이로 늘어선 20여 개의 미세 구덩이 사슬입니다. 쪼개진 혜성이나 소행성 파편들이 기관총을 쏘듯 일렬로 떨어지며 파낸 흔적입니다.", desc_en:"A 50km chain of ~20 tiny pits starting from Davy Y's floor, bursting through the eastern wall into the highlands. Formed by fragments of a torn-apart comet dropping in a straight line like machine-gun fire.", obs:"[추천 관측 월령: 8~9일경, 22~23일경]\n[최적의 관측 타이밍]\n구멍 깊이가 얕아 사선 조명이 비추는 월령 8일(상현 직후)이나 22일(하현 무렵)을 반드시 노려야 구덩이 안쪽에 그림자가 지며 체인이 분리되어 보입니다.\n[무엇을 봐야 할까? (안시 관측)]\n구멍 하나하나의 직경이 1~3km에 불과합니다. 대기가 고요한 날, 8인치 이상 대구경 망원경에 200배 이상의 고배율을 세팅하고 쪼개진 혜성 파편들이 남긴 구멍들을 알알이 분리해내는 한계 시력 테스트에 도전하십시오.\n[사진 촬영 팁]\n시상이 완벽하게 협조해 주어야 합니다. IR-Pass 685nm 필터를 장착하여 대기의 흔들림을 원천 차단하고 초고속 럭키 이미징으로 50km 길이의 목걸이 형태를 쨍하게 담아내세요.", obs_en:"[Recommended Moon Age: 8~9 days, 22~23 days]\n[Optimal Timing]\nThe pits are shallow. You must strictly target day 8 (past first quarter) or day 22 (last quarter) so slanted lighting casts shadows inside the pits, separating the chain.\n[What to look for? (Visual)]\nEach pit is only 1-3km wide. On a calm night, set an 8-inch+ telescope to 200x+ power. Challenge your visual limits by resolving the individual pockmarks left by the shredded comet fragments.\n[Astrophotography Tips]\nDemands perfect seeing. Equip an IR-Pass 685nm filter to ruthlessly freeze atmospheric turbulence and use ultra-fast Lucky Imaging to crisply capture the 50km necklace shape."},
            {id:52, name:"크뤼거 (Crüger)", sig:"용암 칼데라", sig_en:"Lava Caldera", lat:-16.7, lng:-66.8, diam:45, desc:"달 남서쪽 가장자리의 거칠고 밝은 고지대 한가운데에 놓인 직경 45km의 동그란 지형입니다. 테두리 내부에 철과 티타늄 함량이 매우 높은 짙은 현무암질 용암이 고여 있어 고대 화산 칼데라일 가능성이 유력합니다.", desc_en:"A 45km circular feature in the middle of the rough, bright SW highlands. Flooded with dark basaltic lava exceptionally high in iron and titanium, suggesting it might be a massive ancient volcanic caldera.", obs:"[추천 관측 월령: 13일경, 27일경]\n[최적의 관측 타이밍]\n오목한 지형을 보는 것이 아니라 알베도(반사율)의 극단적 대조를 보는 대상이므로, 그림자가 소멸하고 달 전체가 밝게 빛나는 보름달 전후가 관측 최적기입니다.\n[무엇을 봐야 할까? (안시 관측)]\n보름 무렵 서쪽 가장자리 근처를 저배율 아이피스나 쌍안경으로 스캔해 보십시오. 눈부신 사장암 고지대 지형과 완벽하게 흑백 대조를 이루며 까만 잉크처럼 뚜렷하게 돋보이는 짙은 검은색 원형 바닥을 매우 쉽게 찾을 수 있습니다.\n[사진 촬영 팁]\n주변 고지대의 노출 오버(하얗게 타버림)를 막으면서도 크뤼거 바닥의 짙은 어둠을 표현해야 하므로, 촬영 시 다이내믹 레인지를 최대로 확보하는 노출 셋팅이 중요합니다.", obs_en:"[Recommended Moon Age: 13 days, 27 days]\n[Optimal Timing]\nYou are looking for extreme albedo contrast, not topography. The optimal window is around full moon when shadows vanish and the entire moon shines brightly.\n[What to look for? (Visual)]\nNear full moon, scan the western limb with low power or binoculars. You'll easily spot this ink-black circular floor standing out vividly, in perfect black-and-white contrast against the dazzling highland terrain.\n[Astrophotography Tips]\nPrevent the bright surrounding highlands from blowing out (overexposing) while preserving the deep darkness of Crüger's floor. Setting your exposure to maximize dynamic range is critical."},
            {id:53, name:"라몽 (Lamont)", sig:"묻힌 분지", sig_en:"Buried Basin", lat:4.4, lng:23.7, diam:106, desc:"고요의 바다 수면 아래 완전히 파묻힌 거대한 고대 충돌 분지의 '유령 뼈대'입니다. 용암 수축 과정에서 원래 분화구 테두리를 따라 지표면이 융기하며 동심원 형태의 복잡한 주름 능선 네트워크를 수면에 남겼습니다.", desc_en:"The 'ghost skeleton' of a massive ancient basin completely buried beneath Mare Tranquillitatis. Lava contraction buckled the surface along the buried rims, leaving a concentric, complex network of wrinkle ridges.", obs:"[추천 관측 월령: 5일경, 19일경]\n[최적의 관측 타이밍]\n주름 능선의 융기 높이가 매우 낮습니다. 태양 고도가 단 몇 도에 불과하여 빛이 바다를 스치듯 지나가는 단 하루의 찰나의 매직 아워를 잡아야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n명암 경계선이 라몽을 막 통과할 무렵, 100~150배의 중배율 아이피스를 사용하세요. 아무것도 없던 매끄러운 바다 한가운데서 직경 100km가 넘는 거대 동심원의 입체적인 주름 그림자가 마법처럼 솟아오르는 광경을 감상하는 것이 포인트입니다.\n[사진 촬영 팁]\n옅은 주름 능선의 디테일을 극대화하려면 영상 합성 후 High-Pass 필터링이나 미세한 반경(Radius)의 웨이블릿 처리를 더해 주름의 텍스처를 도드라지게 만드세요.", obs_en:"[Recommended Moon Age: 5 days, 19 days]\n[Optimal Timing]\nThe wrinkle ridges are very low. You must catch the fleeting 1-day magic hour window when the sun elevation is mere degrees, grazing the mare.\n[What to look for? (Visual)]\nJust as the terminator passes Lamont, use 100-150x medium power. Watch in awe as the 3D, wrinkled shadow of a massive concentric ring (>100km) magically rises out of the seemingly empty, smooth mare.\n[Astrophotography Tips]\nTo maximize the details of the faint wrinkle ridges, apply High-Pass filtering or small-radius wavelet processing post-stacking to make the wrinkled texture pop out."},
            {id:54, name:"히팔루스 릴 (Hippalus Rilles)", sig:"동심원 릴", sig_en:"Concentric Rilles", lat:-24.5, lng:-29.0, diam:240, desc:"습기의 바다 동쪽 해안선을 따라 직경 240km에 걸쳐 세 가닥으로 크게 호를 그리며 패인 동심원상 균열계입니다. 바다 중심부가 무거운 용암으로 침하할 때 외곽 지각이 장력을 버티지 못하고 찢어진 단층입니다.", desc_en:"A concentric fracture system curving in three vast arcs spanning 240km along Mare Humorum's eastern shore. Formed when the heavy lava-filled basin sank, tearing the outer crust via immense tension.", obs:"[추천 관측 월령: 10~11일경, 24~25일경]\n[최적의 관측 타이밍]\n릴(계곡) 내부로 짙은 그림자가 드리워져 검은 호 모양의 궤적이 선명하게 드러나는 상현/하현 직후의 사선광 타이밍이 최고입니다.\n[무엇을 봐야 할까? (안시 관측)]\n이 동심원 릴들이 해안선 주변의 산맥과 계곡들을 가차 없이 관통하며 달리는 장대한 모습을 중저배율(80배 내외)로 한눈에 훑어보세요. 특히 릴의 중심축이 훼손된 히팔루스(Hippalus) 크레이터의 바닥을 정확하게 반으로 가르며 관통하는 역동적인 모습을 확인하십시오.\n[사진 촬영 팁]\n습기의 바다 전체의 곡률과 이 릴의 동심원 형태가 기하학적으로 완벽히 평행을 이룬다는 것을 보여주기 위해, 바다 가장자리를 넓게 포함하는 구도로 캡처하세요.", obs_en:"[Recommended Moon Age: 10~11 days, 24~25 days]\n[Optimal Timing]\nPrime timing is right after quarter moons under slanted light, which casts deep shadows inside the rilles, clearly revealing their black, arcing trajectories.\n[What to look for? (Visual)]\nUse medium-low power (~80x) to sweep the grand view of these concentric rilles mercilessly slicing through the coastal mountains. Note how the central rille cuts exactly through the floor of the ruined Hippalus crater, splitting it in half.\n[Astrophotography Tips]\nFrame the shot widely to include the mare edge, demonstrating how the geometrical concentric arcs of the rilles perfectly parallel the curvature of Mare Humorum."},
            {id:55, name:"바코 (Baco)", sig:"매끄러운 내부", sig_en:"Smooth Interior", lat:-51.0, lng:19.1, diam:69, desc:"무수한 크레이터들이 서로를 짓이기며 극도로 혼란스럽고 거친 달의 남부 고지대 한가운데에 위치한 직경 69km의 분화구입니다. 기이하리만치 내부 바닥이 평평하고 매끄러운 텍스처를 유지하고 있어 지질학적 미스터리로 꼽힙니다.", desc_en:"A 69km crater smack in the middle of the extremely chaotic southern highlands where countless craters grind into each other. Mysteriously, its inner floor maintains a bizarrely flat, smooth texture.", obs:"[추천 관측 월령: 6~7일경, 20~21일경]\n[최적의 관측 타이밍]\n주변 고지대의 거칠고 험준한 그림자들이 가득 차오르는 명암 경계선 근처일 때, 바코 내부의 텅 빈 평탄함이 오히려 시각적으로 폭발적인 대조를 이룹니다.\n[무엇을 봐야 할까? (안시 관측)]\n시야 전체가 거친 충돌구들로 포화된 남부 고지대를 스캔하다가, 바코 크레이터를 발견하면 150배율로 올려 그 안을 들여다보십시오. 밖의 험준한 폭풍우 속에서도 마치 누군가 내부를 깨끗하게 비질해 놓은 듯한 고요하고 이질적인 평탄함이 주는 강렬한 시각적 충격을 느껴보세요.\n[사진 촬영 팁]\n시상이 불안정하더라도 바코의 평탄한 바닥은 비교적 잘 촬영됩니다. 주변 크레이터들의 날카로운 테두리 대비를 높여 매끄러운 바닥과의 질감 차이를 극대화하는 보정이 좋습니다.", obs_en:"[Recommended Moon Age: 6~7 days, 20~21 days]\n[Optimal Timing]\nWhen the terminator casts rough, rugged shadows over the surrounding highlands, the empty flatness inside Baco creates an explosive visual contrast.\n[What to look for? (Visual)]\nWhile scanning the chaotic southern highlands, locate Baco and raise magnification to 150x. Feel the intense visual shock of its serene, alien flatness—as if swept clean—amidst the rugged storm of terrain raging outside its walls.\n[Astrophotography Tips]\nEven in poor seeing, Baco's flat floor images relatively well. Boost the sharp rim contrast of surrounding craters during processing to maximize the textural difference against the smooth floor."},
            {id:56, name:"남쪽의 바다 (Mare Australe)", sig:"경계 분지", sig_en:"Limb Basin", lat:-49.8, lng:84.5, diam:880, desc:"달의 남동쪽 가장자리에 걸쳐 있는 직경 900km의 거대 고대 분지입니다. 일반적인 평원 바다가 아니라, 수많은 크레이터 바닥 내부로 현무암 용암이 개별적으로 스며들어 크레이터 안에만 짙은 검은색 호수가 형성된 불규칙한 얼룩무늬 바다입니다.", desc_en:"A massive ~900km ancient basin straddling the SE limb. It isn't a solid plain mare; basaltic lava seeped individually into numerous crater floors, forming a patchy 'sea' of deep black lakes confined within crater walls.", obs:"[추천 관측 월령: 남동쪽 칭동 시]\n[최적의 관측 타이밍]\n달의 칭동(Libration) 현상이 남동쪽 방향으로 우리에게 가장 우호적으로 고개를 깊게 숙여 줄 때 단 며칠만 관측 가능한 극한의 타이밍 타겟입니다.\n[무엇을 봐야 할까? (안시 관측)]\n칭동이 우호적일 때 100배율 내외로 남동쪽 지평선 끝자락을 샅샅이 뒤지십시오. 지평선 가장자리에 아슬아슬하게 매달린 여러 크레이터 바닥들에 잉크처럼 고여 있는 짙고 검은 얼룩 패치 무리들을 간신히 엿볼 수 있는 기쁨을 만끽하세요.\n[사진 촬영 팁]\n가장자리 지형이므로 대기 굴절에 의한 색수차와 흐림 현상이 극심합니다. 적외선(IR-Pass) 필터가 지평선 가장자리 디테일을 잡아내는 데 필수적입니다.", obs_en:"[Recommended Moon Age: Favorable SE Libration]\n[Optimal Timing]\nAn extreme timing target. You must wait for the few days when lunar libration tilts the southeast maximally towards us.\n[What to look for? (Visual)]\nWhen libration is favorable, scour the SE horizon at ~100x. Relish the joy of barely peeking at the cluster of deep, ink-black patches pooling in crater floors precariously clinging to the very edge of the horizon.\n[Astrophotography Tips]\nBeing a limb feature, atmospheric refraction causes severe color fringing and blur. An IR-Pass filter is absolutely essential for pulling details out of the extreme horizon."},
            {id:57, name:"라이너 감마 (Reiner Gamma)", sig:"소용돌이", sig_en:"Lunar Swirl", lat:7.7, lng:-59.2, diam:70, desc:"폭풍의 대양 평원 위에 70km 길이로 굽이치는 하얀 소용돌이(Lunar Swirl)입니다. 강력한 국지적 자기장이 태양풍을 튕겨내 우주 풍화를 막아줌으로써 원래의 밝은 흙색을 기묘하게 유지하고 있는 미스터리 지형입니다.", desc_en:"A bizarre, 70km white swirl pattern on Oceanus Procellarum. A localized magnetic anomaly deflects solar wind, shielding it from space weathering and mysteriously preserving the moon's original bright soil color.", obs:"[추천 관측 월령: 13일경~보름, 27일경]\n[최적의 관측 타이밍]\n지형의 고저차가 전혀 없는 평면 무늬이므로 사선광이 비추는 상/하현 때는 완전히 보이지 않는 스텔스 모드가 됩니다. 태양빛이 위에서 수직으로 꽂히는 보름달 무렵이 최고의 타이밍입니다.\n[무엇을 봐야 할까? (안시 관측)]\n보름 무렵 100배율 아이피스로 어두운 짙은 회색 현무암 바다를 스캔하세요. 지형 그림자는 하나도 없는데, 표면 위에 밀가루를 흩뿌린 듯 올챙이나 혜성 모양으로 밝게 빛나는 나선형 하얀 무늬의 알베도 대조를 뚜렷하게 관측할 수 있습니다.\n[사진 촬영 팁]\n컬러 카메라를 활용해 미네랄 문(Mineral Moon) 채도 부스팅 기법을 적용하면, 주변 바다의 티타늄 성분 색상과 하얀 소용돌이의 색상 차이를 극명하게 분리해 낼 수 있습니다.", obs_en:"[Recommended Moon Age: 13 days~Full, 27 days]\n[Optimal Timing]\nIt has zero topographical relief, so it goes full stealth mode under slanted light. The best timing is near full moon when sunlight beams straight down.\n[What to look for? (Visual)]\nNear full moon, scan the dark gray basalt mare at 100x. With no topographical shadows present, clearly observe the sharp albedo contrast of this bright, white, swirling pattern resembling a tadpole or comet dusted with flour over the surface.\n[Astrophotography Tips]\nUse a color camera and apply Mineral Moon saturation boosting. This clearly separates the titanium-based color of the surrounding mare from the white swirl's distinct hue."},
            {id:58, name:"레이타 계곡 (Vallis Rheita)", sig:"이차 충돌구", sig_en:"Secondary Impact", lat:-42.5, lng:51.5, diam:445, desc:"달 남동부 고지대를 거칠고 깊게 파낸 길이 500km의 웅장한 선형 골짜기입니다. 감로주의 바다 형성 시 뿜어져 나온 거대한 바위 파편들이 빗자루처럼 지면을 휩쓸고 파낸 거대한 이차 충돌(Secondary Impact) 상흔입니다.", desc_en:"A majestic 500km linear valley roughly gouging the SE highlands. Formed when massive boulder debris from the Nectaris basin impact swept the ground like a broom, creating a colossal secondary impact scar.", obs:"[추천 관측 월령: 4~5일경, 18~19일경]\n[최적의 관측 타이밍]\n깊게 파인 계곡의 거친 질감을 보기 위해 일출이나 일몰 시의 사선광이 계곡 안으로 깊은 그림자를 만들어내는 시기를 노려야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n100배 내외의 중배율을 사용하세요. 주변 크레이터들의 둥근 테두리 형태를 완전히 무시한 채, 북서쪽에서 남동쪽을 향해 굵고 폭력적으로 깎여나간 거대한 협곡의 질감을 보며 당시 달 지면을 덮쳤던 분출물 폭풍의 파괴적인 에너지를 유추해 보십시오.\n[사진 촬영 팁]\n달의 가장자리 방향으로 뻗어 있기 때문에 원근감 왜곡이 있습니다. 계곡의 웅장한 길이를 한 번에 담으려면 센서 모서리 끝에서 끝으로 사선을 가로지르는 구도로 촬영하세요.", obs_en:"[Recommended Moon Age: 4~5 days, 18~19 days]\n[Optimal Timing]\nTo see the rough texture of the deeply gouged valley, you must target the slanted light at sunrise/sunset, which casts deep shadows into the trench.\n[What to look for? (Visual)]\nUse ~100x medium power. Observe the texture of this massive gorge violently carved from NW to SE, completely ignoring existing circular crater rims. Visualize the destructive energy of the ejecta storm that battered the lunar surface.\n[Astrophotography Tips]\nIt stretches towards the limb, causing foreshortening. To capture its majestic length in one shot, frame the valley diagonally from corner to corner across the sensor."},
            {id:59, name:"실러-주키우스 (Schiller-Zucchius Basin)", sig:"훼손 분지", sig_en:"Degraded Basin", lat:-56.0, lng:-45.0, diam:335, desc:"달 남서쪽에 간신히 형체만 남은 직경 335km의 고대 충돌 분지입니다. 오리엔탈레 분지처럼 웅장했으나 수십억 년간 무수한 소행성의 추가 폭격을 받아 테두리가 깎이고 뼈대와 일부 융기선만 희미하게 남은 침식 분지의 표본입니다.", desc_en:"An ancient 335km basin barely retaining its shape in the SW. Once magnificent like Orientale, billions of years of asteroid bombardments eroded its rims, leaving only a faint skeleton of ridges as a textbook degraded basin.", obs:"[추천 관측 월령: 11~12일경, 25~26일경]\n[최적의 관측 타이밍]\n테두리가 매우 얕게 허물어져 있으므로, 태양빛이 지평선을 거의 스치다시피 하는 명암 경계선 근처일 때만 얕은 융기선이 윤곽을 드러냅니다.\n[무엇을 봐야 할까? (안시 관측)]\n초보자에게는 매우 어려운 타겟입니다. 100배율 정도로 주키우스(Zucchius) 크레이터를 중심점으로 삼고 주변 산맥과 얕은 융기선들의 미묘하게 구부러진 곡선들을 조각조각 따라가며, 머릿속으로 직경 335km의 거대한 원형 구조를 상상력으로 복원해내는 퍼즐 맞추기를 즐겨보세요.\n[사진 촬영 팁]\n희미한 윤곽을 살리려면 과도한 샤프닝보다는 노이즈를 억제한 상태에서 넓은 반경의 로컬 콘트라스트(Local Contrast)를 향상시키는 후보정 기법이 효과적입니다.", obs_en:"[Recommended Moon Age: 11~12 days, 25~26 days]\n[Optimal Timing]\nBecause its rims are extremely shallow and degraded, the faint ridges only reveal their outline when sunlight almost perfectly grazes the horizon near the terminator.\n[What to look for? (Visual)]\nA very difficult target for beginners. Using Zucchius crater as the center at ~100x, follow the subtly curving arcs of the shallow ridges piece by piece, enjoying the puzzle-solving of mentally reconstructing the massive 335km circular structure.\n[Astrophotography Tips]\nTo bring out the faint outlines, avoid harsh sharpening. Instead, apply large-radius Local Contrast enhancement while keeping noise suppressed during post-processing."},
            {id:60, name:"키스 파이 돔 (Kies Pi)", sig:"전형적 화산", sig_en:"Shield Volcano", lat:-26.9, lng:-24.2, diam:45, desc:"구름의 바다 남쪽에 위치한 달에서 가장 교과서적이고 아름다운 방패 화산(Shield Volcano)입니다. 높이는 160m에 불과해 경사도가 1~2도로 극도로 완만하며, 정상부에 마그마가 함몰된 작은 칼데라가 뚫려 있습니다.", desc_en:"The most textbook and beautiful shield volcano on the moon. It's only 160m high, making its slope an extremely gentle 1-2 degrees. At its summit is a small collapse caldera vent.", obs:"[추천 관측 월령: 9~10일경, 23~24일경]\n[최적의 관측 타이밍]\n경사가 1도 남짓하여 조명각이 높아지면 완벽한 스텔스 상태가 됩니다. 명암 경계선이 정확히 키스 파이를 지나는 극저각 조명 시기의 단 1~2시간만 관측 가능합니다.\n[무엇을 봐야 할까? (안시 관측)]\n200배 이상의 고배율과 안정된 대기 조건(Seeing) 하에서, 볼록한 렌즈 모양의 돔이 바다 평면 위로 입체적으로 솟아오른 우람한 부피감을 느껴보세요. 대기가 고요하다면 정상에 뚫린 2km 직경의 캘데라 구멍을 시각적으로 분해해 내는 한계 관측에 도전하세요.\n[사진 촬영 팁]\n정상의 캘데라 구멍은 안시로는 거의 점으로만 보이므로, 행성 카메라를 이용한 럭키 이미징 스태킹을 통해 이 구멍의 완벽한 '원형(Circle)' 형태를 사진으로 입명해 보십시오.", obs_en:"[Recommended Moon Age: 9~10 days, 23~24 days]\n[Optimal Timing]\nWith a ~1 degree slope, it goes stealth if the sun rises. You only have a 1-2 hour window of extreme low-angle lighting when the terminator exactly crosses Kies Pi.\n[What to look for? (Visual)]\nUsing 200x+ power under steady seeing, feel the bulky volume of this convex lens-shaped dome rising from the mare. If the air is calm, challenge yourself to visually resolve the tiny 2km caldera pit pierced at the summit.\n[Astrophotography Tips]\nThe summit caldera is barely a dot visually. Use Lucky Imaging stacking with a planetary camera to photographically prove its perfectly 'circular' shape."},
            {id:61, name:"뫼스티히 A (Mösting A)", sig:"중심 크레이터", sig_en:"Central Crater", lat:-3.2, lng:-5.2, diam:13, desc:"달 원반의 기하학적 정중앙 근처에 위치한 작고 밝으며 깊은 사발 모양의 크레이터입니다. 완벽한 위치와 깊이 덕분에 달의 자전과 3차원 좌표계 확립을 위한 천문학적 관측의 절대 기준점으로 쓰였습니다.", desc_en:"A small, bright, deeply bowl-shaped crater near the geometrical center of the lunar disk. Thanks to its perfect location and deep structure, it historically served as the absolute fundamental reference point for mapping lunar coordinates.", obs:"[추천 관측 월령: 8일경, 22일경, 보름]\n[최적의 관측 타이밍]\n어느 위상에서나 잘 보이지만, 달 중심점으로서의 상징성을 느끼려면 둥근 보름달이 떴을 때 전체 샷의 정중앙 좌표로 활용해 보는 것이 좋습니다.\n[무엇을 봐야 할까? (안시 관측)]\n달을 저배율로 볼 때 달의 기하학적 중심을 가늠하는 랜드마크로 사용하십시오. 망원경 배율을 150배 정도로 올리면, 깊은 사발 모양 지형 덕분에 크레이터 가장자리의 햇빛 반사율이 주변 바다보다 비정상적으로 높아 유난히 쨍하게 빛나는 모습을 확인할 수 있습니다.\n[사진 촬영 팁]\n이 밝고 날카로운 크레이터를 화면 정중앙 십자선에 두고 구도를 잡은 뒤, 주변의 중앙만(Sinus Medii)과 알폰수스, 프톨레마이오스 계곡을 함께 담아 달의 '배꼽' 구역을 멋지게 촬영해 보세요.", obs_en:"[Recommended Moon Age: 8 days, 22 days, Full]\n[Optimal Timing]\nVisible in any phase, but to feel its symbolism as the lunar center, use it as the dead-center coordinate in a full moon wide shot.\n[What to look for? (Visual)]\nUse it as a landmark to gauge the moon's geometrical center at low power. At ~150x, confirm that due to its deeply scooped bowl shape, the rim's reflectivity is abnormally higher than the surrounding mare, making it shine exceptionally bright.\n[Astrophotography Tips]\nPlace this bright, sharp crater dead on the center crosshairs, framing the surrounding Sinus Medii, Alphonsus, and Ptolemaeus valleys to beautifully capture the moon's 'belly button' region."},
            {id:62, name:"륌커 돔 (Mons Rümker)", sig:"화산 복합체", sig_en:"Volcanic Complex", lat:40.8, lng:-58.1, diam:70, desc:"폭풍의 대양 북서쪽 끝자락에 완전히 고립된 직경 70km, 높이 1km의 거대 화산 복합 융기대입니다. 수십 개의 작은 방패 화산과 돔들이 수천만 년 동안 엉겨 붙어 생성된 복잡하고 거친 지형입니다.", desc_en:"A massive 70km wide, 1km high volcanic complex floating isolated at the NW edge of Oceanus Procellarum. Formed by dozens of small shield volcanoes and domes erupting and clumping together over tens of millions of years.", obs:"[추천 관측 월령: 13일경, 27일경]\n[최적의 관측 타이밍]\n오돌토돌한 수많은 언덕의 그림자가 뚜렷해지는 명암 경계선 스칠 무렵에 관측해야만 그 진가와 복잡한 텍스처를 100% 알 수 있습니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배 이상의 배율로 외롭게 떠 있는 융기대 상단 표면을 조준하세요. 마치 주름진 인간의 뇌 표면이나 포도송이처럼 빽빽하게 뭉쳐 있는 30개 이상의 미세한 돔 무리들의 섬뜩하고 기괴한 질감을 분해해 내는 쾌감을 느껴보십시오.\n[사진 촬영 팁]\n복합체의 질감을 살리면서도 배경의 어두운 바다(Mare)가 노이즈로 덮이지 않도록, 장노출 촬영보다는 짧은 노출로 프레임 수를 압도적으로 늘려(5000장 이상) 스태킹 품질을 높이는 것이 유리합니다.", obs_en:"[Recommended Moon Age: 13 days, 27 days]\n[Optimal Timing]\nIts true value and complex texture are 100% revealed only when grazing the terminator, which sharpens the shadows of its numerous bumpy hills.\n[What to look for? (Visual)]\nAim at the upper surface of this isolated complex at 150x+. Relish the thrill of resolving the eerie, bizarre texture of over 30 densely clustered domes, resembling the wrinkled surface of a human brain or a bumpy bunch of grapes.\n[Astrophotography Tips]\nTo preserve the complex's texture without flooding the dark mare background with noise, it's better to drastically increase frame count (>5000 frames) with short exposures for high-quality stacking rather than using long exposures."},
            {id:63, name:"비의 바다 조각 (Imbrium Sculpture)", sig:"방사형 상흔", sig_en:"Radial Grooves", lat:11.0, lng:12.0, diam:50, desc:"아펜니노 산맥 남쪽 고지대 표면에 광범위하게 새겨진 빗살무늬 계곡들입니다. 약 38억 년 전 비의 바다 거대 충돌 시 치솟은 수억 톤의 바위 파편들이 방사형으로 긁고 파내며 남긴 파괴적인 상흔입니다.", desc_en:"Deep, comb-like grooves extensively carved south of the Apennines. ~3.8 billion years ago, during the Imbrium impact, hundreds of millions of tons of rock debris blasted out and radially scraped these destructive scars.", obs:"[추천 관측 월령: 7~8일경, 21~22일경]\n[최적의 관측 타이밍]\n조명각이 매우 얕아 선형 계곡들 속으로 길고 짙은 그림자가 드리워지는 상/하현달 무렵이 텍스처를 느끼기에 가장 완벽합니다.\n[무엇을 봐야 할까? (안시 관측)]\n80~100배의 저배율 아이피스로 프톨레마이오스와 알바테그니우스 주변의 넓은 지역을 스캔하십시오. 크레이터 테두리나 지형에 상관없이 전체 지면이 북서쪽(비의 바다 방향)에서 남동쪽으로 일제히 거대한 갈퀴로 빗질을 당한 듯 긁혀나간 소름 돋는 선형 텍스처를 직관적으로 체감할 수 있습니다.\n[사진 촬영 팁]\n강력한 에너지가 휩쓸고 간 방향성(Directionality)을 사진에 강조하려면, 이 빗살무늬들이 프레임을 대각선으로 관통하도록 구도를 비스듬히 틀어 모자이크 촬영해 보십시오.", obs_en:"[Recommended Moon Age: 7~8 days, 21~22 days]\n[Optimal Timing]\nPerfect around quarter moons when extreme shallow lighting casts long, deep shadows into the linear valleys to reveal the texture.\n[What to look for? (Visual)]\nScan the wide area around Ptolemaeus with a low-power (80-100x) eyepiece. Regardless of crater rims, intuitively feel the chilling linear texture where the entire ground looks raked by a giant comb from the NW (Imbrium direction) towards the SE.\n[Astrophotography Tips]\nTo emphasize the directionality of the powerful energy flow, angle your camera so these comb-like grooves pierce diagonally across the frame and shoot a mosaic."},
            {id:64, name:"데카르트 (Descartes)", sig:"아폴로 16호", sig_en:"Apollo 16 Landing", lat:-11.7, lng:15.7, diam:48, desc:"거친 고지대 한가운데에 예외적으로 매끄러운 바닥을 가진 훼손된 크레이터입니다. 주변 평원(데카르트-케일리)은 강력한 자기 이상을 띠며, 아폴로 16호가 착륙해 이곳이 화산재가 아닌 충돌 분출물 지형임을 밝혀냈습니다.", desc_en:"A degraded crater with an exceptionally smooth floor in the rough highlands. The surrounding plain exhibits strong magnetic anomalies. Apollo 16 landed here and proved it was formed by impact ejecta, not volcanic ash.", obs:"[추천 관측 월령: 6~7일경, 20~21일경]\n[최적의 관측 타이밍]\n명암 경계선 부근일 때 주변 고지대의 거친 텍스처와 케일리 평원의 매끄러운 바닥 사이의 시각적 대조가 가장 극명하게 나타납니다.\n[무엇을 봐야 할까? (안시 관측)]\n빛나고 뚜렷한 형태의 칸트(Kant) 크레이터와 데카르트의 뭉개진 테두리를 비교하여 시야를 확보하세요. 100배율 내외로, 데카르트 주변의 거친 운석 구덩이 지형들 사이로 비정상적으로 매끄럽고 평탄하며 주변 바다(Mare)보다는 훨씬 밝은 톤으로 뻗어나간 '케일리 평원'의 확장을 눈으로 추적해보세요.\n[사진 촬영 팁]\n사진 촬영 후 샤프닝을 과하게 주면 이 지역 특유의 매끄러운 평원 텍스처가 노이즈로 오염되어 역사적인 의미가 퇴색되니 부드럽게 보정하십시오.", obs_en:"[Recommended Moon Age: 6~7 days, 20~21 days]\n[Optimal Timing]\nNear the terminator, the visual contrast between the rough highland texture and the smooth floor of the Cayley plains is most striking.\n[What to look for? (Visual)]\nFind your field by comparing the sharp Kant crater with Descartes' squashed rim. At ~100x, visually trace the expansion of the Cayley Plains threading through the rough terrain—noticing its abnormally smooth, flat texture that is significantly brighter than typical mare plains.\n[Astrophotography Tips]\nOver-sharpening will pollute the unique smooth texture of these historic plains with noise, fading their geological significance. Process them softly."},
            {id:65, name:"호르텐시우스 돔 (Hortensius Domes)", sig:"돔 군락", sig_en:"Dome Cluster", lat:7.6, lng:-27.9, diam:10, desc:"코페르니쿠스 남서쪽 평면에 다이아몬드 형태로 무리 지어 솟아 있는 6개의 전형적인 방패 화산(Shield Volcano) 돔 군락입니다. 각 돔의 지름은 6~8km, 높이는 불과 400m 내외로 극히 완만합니다.", desc_en:"A cluster of six classic shield volcanic domes bunched in a diamond shape SW of Copernicus. Each dome is 6-8km across but only ~400m high, making their slopes extremely gentle.", obs:"[추천 관측 월령: 9~10일경, 23~24일경]\n[최적의 관측 타이밍]\n높이가 400m 밖에 안되어 그림자가 가장 길어지는 일출/일몰 직전의 단 한두 시간 동안만 형태를 드러내는 고난이도 타이밍 타겟입니다.\n[무엇을 봐야 할까? (안시 관측)]\n200배율 이상의 고배율 아이피스를 끼우고 대기 흔들림이 가라앉기를 기다리며, 여드름처럼 볼록하게 솟아오른 6개의 돔 실루엣을 구별해 내십시오. 나아가 시력이 허락한다면 돔 정상에 미세하게 파인 화구(Caldera) 점을 분해해 내는 한계 시력 테스트를 진행하세요.\n[사진 촬영 팁]\n시상이 완벽한 순간을 포착하여 럭키 이미징으로 6개의 돔과 정상의 미세 캘데라를 또렷한 다이아몬드 구도로 담아낸다면 훌륭한 관측 기록이 됩니다.", obs_en:"[Recommended Moon Age: 9~10 days, 23~24 days]\n[Optimal Timing]\nOnly ~400m high, they are a high-difficulty timing target revealing their shape for only an hour or two right at sunrise/sunset when shadows are longest.\n[What to look for? (Visual)]\nEquip 200x+ power, wait for steady seeing, and distinguish the 6 pimple-like dome silhouettes. If your vision allows, challenge yourself to resolve the tiny caldera pits dotted at their summits.\n[Astrophotography Tips]\nCatch a moment of perfect seeing and use Lucky Imaging. Capturing all 6 domes and their tiny summit calderas in a crisp diamond formation makes for an outstanding observation record."},
            {id:66, name:"해들리 릴 (Hadley Rille)", sig:"아폴로 15호", sig_en:"Apollo 15 Site", lat:25.0, lng:3.0, diam:80, desc:"아펜니노 산맥 북쪽 기슭을 따라 폭 1.5km, 깊이 300m에 걸쳐 구불구불 파인 유명한 용암 수로입니다. 아폴로 15호 우주비행사들이 월면차를 타고 이 계곡 낭떠러지를 달렸습니다.", desc_en:"The famous lava channel, 1.5km wide and 300m deep, winding along the northern Apennines. Apollo 15 astronauts drove their lunar rover along its precipice.", obs:"[추천 관측 월령: 7~8일경, 21~22일경]\n[최적의 관측 타이밍]\n산맥의 거대한 그림자가 계곡 주변 지형의 윤곽을 살려주어 입체적인 지형 맵핑이 쉬워지는 상/하현 부근이 필수적입니다.\n[무엇을 봐야 할까? (안시 관측)]\n관측지 대기가 매우 안정된 날 8인치 이상 대구경 망원경에 200~300배의 초고배율을 세팅해야만 시야에 들어옵니다. 아펜니노 산맥의 거대한 그림자를 뚫고, 산맥의 굴곡을 따라 뱀처럼 요리조리 피하며 이어지는 실낱같은 계곡의 자취를 끝까지 추적해 낸 후 그곳을 누비던 아폴로 15호를 상상해 보십시오.\n[사진 촬영 팁]\n적외선 패스(IR 685nm 이상) 필터가 절대적으로 필요합니다. 대기 흔들림을 뚫고 1.5km 폭의 미세 협곡 곡선을 뚜렷하게 분해해 내는 것은 아마추어 장비의 성능을 입증하는 최고의 결과물입니다.", obs_en:"[Recommended Moon Age: 7~8 days, 21~22 days]\n[Optimal Timing]\nEssential around quarter moons when the Apennines' massive shadows highlight the terrain contours, making 3D mapping easier.\n[What to look for? (Visual)]\nOnly visible on nights of very steady seeing with an 8-inch+ telescope at ultra-high 200x-300x power. Pierce the Apennines' shadows and trace the thread-like gorge dodging along the mountain contours to the end, imagining Apollo 15 roving there.\n[Astrophotography Tips]\nAn IR-Pass (685nm+) filter is absolutely necessary. Piercing turbulence to crisply resolve the curving 1.5km-wide gorge is the ultimate proof of amateur equipment performance."},
            {id:67, name:"프라 마우로 (Fra Mauro Formation)", sig:"분출물 고원", sig_en:"Ejecta Formation", lat:-3.6, lng:-17.5, diam:100, desc:"비의 바다 거대 충돌 시 뿜어져 나온 상상 초월의 파편들이 비 오듯 쏟아져 내려 원래 있던 지형들을 완전히 묻어버리고 융기시킨 역사적 고원(아폴로 14호 착륙지)입니다.", desc_en:"A historic plateau (Apollo 14 landing site) violently uplifted when unimaginable amounts of ejecta from the Imbrium impact rained down, burying pre-existing features.", obs:"[추천 관측 월령: 8~9일경, 22~23일경]\n[최적의 관측 타이밍]\n사선 조명 하에서 지형들이 길게 끌린 흔적이 강하게 드러나는 상현 직후나 하현 무렵이 지질학적 힘을 느끼기 가장 좋습니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배율로 관측하면, 마치 거대한 빗자루로 달 표면을 거칠게 쓸어내린 듯 북쪽에서 남쪽으로 흐르는 선형적인 파괴 흔적들을 읽어낼 수 있습니다. 두꺼운 모래사장에 파묻힌 것처럼 간신히 얕은 테두리 능선만 동그랗게 남긴 프라 마우로와 파리(Parry) 크레이터의 형상을 확인하며 충돌 파편의 엄청난 두께를 가늠해 보십시오.\n[사진 촬영 팁]\n지형의 얕은 질감이 노이즈에 묻히기 쉬우므로, 럭키 이미징 스태킹 프레임 수를 대폭 늘려 SNR(신호대잡음비)을 극대화한 후 부드럽게 콘트라스트를 올려야 빗자루로 쓸린 흔적이 자연스럽게 나타납니다.", obs_en:"[Recommended Moon Age: 8~9 days, 22~23 days]\n[Optimal Timing]\nUnder slanted light right after first quarter, the long dragged scars of the terrain strongly emerge, best to feel the geological forces.\n[What to look for? (Visual)]\nAt 150x, read the linear scars of destruction flowing north to south, as if swept by a giant broom. Confirm Fra Mauro and Parry craters—barely leaving shallow rim outlines as if buried in deep sand—to gauge the tremendous thickness of the impact debris.\n[Astrophotography Tips]\nThe shallow textures easily get lost in noise. Drastically increase Lucky Imaging stack count to maximize SNR, then gently boost contrast to naturally reveal the broom-swept scars."},
            {id:68, name:"플램스티드 P (Flamsteed P)", sig:"용암 링", sig_en:"Ghost Ring", lat:-3.0, lng:-44.0, diam:112, desc:"폭풍의 대양 남쪽에 위치한 유령 크레이터(Ghost Ring)입니다. 거대 크레이터였으나 대규모 용암 쓰나미가 수몰시켰고, 가장 높았던 외벽 산봉우리들만 수면 위로 점선처럼 간신히 드러나 완벽한 링을 그립니다.", desc_en:"A Ghost Ring in southern Oceanus Procellarum. Once a giant crater, a massive lava tsunami submerged it. Only the highest outer rim peaks barely protrude like a dotted line, tracing a perfect ring.", obs:"[추천 관측 월령: 11~12일경, 25~26일경]\n[최적의 관측 타이밍]\n정면 조명에선 흔적조차 보이지 않습니다. 일출/일몰 시 태양 고도가 1~2도에 불과하여 얕은 돌출부가 수십 킬로미터 그림자를 던지는 극한의 찰나 타이밍을 잡아야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배율 이상의 고배율로 아무것도 없는 매끄러운 평면 위를 스캔하십시오. 희미한 점선들이 완벽하게 동그란 링 형태로 튀어나와 부드러운 음영을 던지는 유령 같은 융기 돌출부를 찾아내는 것이 포인트입니다. 점선 고리 안팎의 용암 바다 수면이 단차 없이 완벽히 평행한 시각적 고요함을 느껴보십시오.\n[사진 촬영 팁]\n콘트라스트가 거의 없는 피사체이므로, 촬영 카메라의 감마/게인을 조절하여 명암 대비의 다이내믹 레인지를 최대로 확보하는 셋팅이 필수입니다.", obs_en:"[Recommended Moon Age: 11~12 days, 25~26 days]\n[Optimal Timing]\nInvisible under direct light. Catch the extreme fleeting timing at sunrise/sunset when the 1-2 degree sun elevation allows the shallow bumps to cast ten-kilometer shadows.\n[What to look for? (Visual)]\nScan the empty, smooth plains at 150x+. The point is to find the ghost-like raised protrusions where faint dotted lines pop out in a perfect circle, casting soft shadows. Feel the visual serenity of the lava 'sea level' perfectly matching inside and outside the ring with zero elevation difference.\n[Astrophotography Tips]\nA target with virtually no contrast. Setting your camera's gamma/gain to secure maximum dynamic range in tonal contrast is essential."},
            {id:69, name:"코페르니쿠스 2차 (Copernicus Secondary Craters)", sig:"파편 낙하", sig_en:"Secondary Craters", lat:19.6, lng:-19.1, diam:4, desc:"코페르니쿠스 형성 시 하늘로 솟구친 집채만 한 거대 파편들이 포물선을 그리며 바다 위로 떨어져 기관총에 맞은 듯 빽빽하게 만들어낸 수많은 미세 2차 충돌 구덩이들입니다.", desc_en:"When Copernicus formed, house-sized boulders blasted into the sky and rained down on the mare, creating a dense swarm of tiny secondary craters looking like machine-gun fire.", obs:"[추천 관측 월령: 9~10일경, 23~24일경]\n[최적의 관측 타이밍]\n상현 직후 구덩이들 안쪽으로 그림자가 깊게 박혀 체인의 구별이 확실해질 때가 가장 좋습니다.\n[무엇을 봐야 할까? (안시 관측)]\n비의 바다 남쪽, 피테아스(Pytheas) 크레이터 주변을 가로지르는 하얀 광조 선을 가이드라인 삼아 150배 이상의 배율로 스캔하십시오. 하나의 큰 구덩이가 아니라, 지름 1~3km 내외의 자잘한 미세 구덩이들이 사슬처럼 줄지어 있거나 무더기로 얽혀 있는 독특한 파편 낙하 패턴(Secondary crater chain)을 분해해 내는 것이 목표입니다.\n[사진 촬영 팁]\n적외선(IR) 필터 적용과 함께, 이미지 스케일을 키우기 위한 2~3배 바로우 렌즈 활용이 미세 구멍들을 명확한 도트로 분리해 내는 데 강력한 무기가 됩니다.", obs_en:"[Recommended Moon Age: 9~10 days, 23~24 days]\n[Optimal Timing]\nBest right after first quarter when shadows fall deep inside the pits, clearly separating the chains.\n[What to look for? (Visual)]\nUse the white rays crossing near Pytheas crater as a guideline to scan at 150x+. Your goal is not to find one large hole, but to resolve the unique falling-debris patterns where tiny 1-3km pits are strung in chains or tangled in bunches.\n[Astrophotography Tips]\nAlongside an IR filter, utilizing a 2-3x Barlow lens to increase image scale is a powerful weapon to clearly separate the tiny holes into distinct dots."},
            {id:70, name:"훔볼트 분지 (Humboldtianum Basin)", sig:"가장자리 바다", sig_en:"Limb Mare", lat:57.0, lng:80.0, diam:650, desc:"달의 북동쪽 지평선 너머 뒷면을 향해 아슬아슬하게 걸쳐 있는 거대 다중 고리 충돌 분지입니다. 달 극단에 위치해 있어 전체 형태를 온전히 파악하기 어렵습니다.", desc_en:"A massive multi-ring basin precariously straddling the far NE limb, wrapping towards the far side. Located at the extreme edge, grasping its complete form is difficult.", obs:"[추천 관측 월령: 동북 칭동 최대 시]\n[최적의 관측 타이밍]\n달의 칭동 현상이 북동쪽으로 가장 유리하게 기울어질 때만 간신히 볼 수 있는 최상급 고난이도 타겟입니다.\n[무엇을 봐야 할까? (안시 관측)]\n칭동이 최대일 때 100배율 내외로 북동쪽 지평선 가장자리를 조준하십시오. 둥근 달의 외곽 곡선을 따라 층층이 평행하게 쌓인 산맥 고리의 톱니바퀴 같은 실루엣과, 그 산맥 사이에 길게 고인 짙은 바다 무늬가 지평선을 따라 그려내는 우주적 스케일을 아슬아슬하게 포착해 보십시오.\n[사진 촬영 팁]\n지평선 가장자리이므로 대기 분산 보정기(ADC)의 수평 셋팅을 완벽하게 맞추어 촬영해야, 산맥과 바다의 경계선에 발생하는 파란색/빨간색 색 번짐을 없앨 수 있습니다.", obs_en:"[Recommended Moon Age: Max NE Libration]\n[Optimal Timing]\nA top-tier difficulty target only visible when lunar libration tilts the northeast maximally towards us.\n[What to look for? (Visual)]\nWhen libration peaks, aim at the NE horizon at ~100x. Precariously catch the cosmic scale: the sawtooth silhouette of layered mountain rings stacked parallel to the moon's outer curve, and the long, dark mare patches pooling between those mountains.\n[Astrophotography Tips]\nBeing on the limb, setting your Atmospheric Dispersion Corrector (ADC) perfectly horizontal is crucial to eliminate the blue/red color fringing on the mountain and mare boundaries."},
            {id:71, name:"술피키우스 갈루스 (Sulpicius Gallus)", sig:"화산재", sig_en:"Volcanic Ash", lat:19.6, lng:11.6, diam:12, desc:"맑음의 바다 남서쪽 가장자리에 형성된 '암색 맨틀 퇴적층(DMD)'입니다. 화산 가스와 함께 분출된 철과 티타늄 함량이 매우 높은 검은 화산재가 지표를 두껍게 뒤덮었습니다.", desc_en:"A 'Dark Mantle Deposit' on the SW edge of Mare Serenitatis. Black volcanic ash, extremely high in iron and titanium erupted with volcanic gas, thickly blanketed the surface.", obs:"[추천 관측 월령: 7~8일경, 21~22일경, 보름 전후]\n[최적의 관측 타이밍]\n보름달 무렵 빛이 정면으로 비출 때, 어두운 토양과 밝은 토양 간의 알베도(반사율) 대조가 극대화되어 가장 뚜렷하게 관측됩니다.\n[무엇을 봐야 할까? (안시 관측)]\n밝은 하에무스 산맥과 짙은 회색 현무암 바다 사이에서 유난히 시꺼먼 먹물이나 숯가루를 뿌려놓은 듯한 길쭉한 형태의 짙은 얼룩 패치를 저배율 아이피스로 명확하게 구별해 내십시오. 달 표면에서 가장 어두운 지점 중 하나라는 점을 체감할 수 있습니다.\n[사진 촬영 팁]\n주변 산맥이 너무 밝아 어두운 퇴적층이 묻힐 수 있습니다. 히스토그램을 세밀하게 모니터링하며 중간 어두운 톤(Mid-shadows)의 디테일이 뭉개지지 않도록 노출을 조절하세요.", obs_en:"[Recommended Moon Age: 7~8 days, 21~22 days, Around Full Moon]\n[Optimal Timing]\nWhen direct sunlight hits around full moon, the albedo contrast between dark and bright soils maximizes, making it stand out perfectly.\n[What to look for? (Visual)]\nUsing low power, clearly distinguish this elongated, intensely dark patch—looking like spilled ink or scattered charcoal powder—sandwiched between the bright mountains and the dark gray basalt mare. Feel that it is one of the darkest spots on the moon.\n[Astrophotography Tips]\nThe bright surrounding mountains can overpower the dark deposit. Monitor the histogram closely and adjust exposure so the mid-shadow details don't get crushed into pure black."},
            {id:72, name:"아틀라스 암점 (Atlas Dark-Halo Craters)", sig:"바닥 화산구", sig_en:"Dark Halo Pits", lat:46.7, lng:44.4, diam:87, desc:"아틀라스 크레이터 바닥 양 끝단에 대칭적으로 위치한 2개의 뚜렷한 암색 반점입니다. 바닥이 융기하며 갈라진 틈새를 통해 화쇄류가 폭발해 하얀 바닥 위에 검은 화산재를 원형으로 떨어뜨렸습니다.", descen:"Two distinct dark spots symmetrically located at the ends of Atlas crater's floor. Volcanic gas and pyroclastic flows erupted through floor fractures, dropping circular black ash on the white floor.", obs:"[추천 관측 월령: 5~6일경, 19~20일경]\n[최적의 관측 타이밍]\n크레이터 바닥 내부의 전반적인 형태를 잡아주는 명암 경계선이 살짝 비켜가 그림자가 약간 짧아질 때 흑백 대비가 가장 훌륭합니다.\n[무엇을 봐야 할까? (안시 관측)]\n먼저 중배율로 하얀 바탕에 잉크를 떨어뜨린 것처럼 자리 잡은 검은 반점 두 개를 확인하십시오. 그 후 200배 이상의 고배율로 세팅하여, 검은 반점 정중앙에 화쇄류를 뿜어낸 직경 2~3km의 매우 미세한 실제 화산 분출구(Vent) 점을 광학적으로 분해해 내는 한계 관측에 도전하십시오.\n[사진 촬영 팁]\n적외선(IR-Pass) 필터를 장착한 럭키 이미징으로 대기를 얼려버린 뒤, 강도 높은 디콘볼루션(Deconvolution) 처리를 적용하여 중앙의 2~3km 분출구를 점으로 분리해 내세요.", obs_en:"[Recommended Moon Age: 5~6 days, 19~20 days]\n[Optimal Timing]\nWhen the terminator passes slightly and shadows shorten, lifting the floor brightness and offering the best black-and-white contrast against the halos.\n[What to look for? (Visual)]\nFirst, use medium power to confirm the two black spots sitting like ink drops on the white floor. Then, set to 200x+ and challenge your optical limits to resolve the extremely tiny 2-3km actual volcanic vent pits pierced dead center within the black spots.\n[Astrophotography Tips]\nFreeze the atmosphere using an IR-Pass filter and Lucky Imaging, then apply intensive Deconvolution processing to separate the central 2-3km vents into distinct dots."},
            {id:73, name:"스미스의 바다 (Mare Smythii)", sig:"동쪽 경계", sig_en:"Eastern Limb Mare", lat:-2.0, lng:87.0, diam:740, desc:"적도 부근 동쪽 지평선 너머 달 뒷면에 절반 이상 치우친 원형 바다 분지입니다. 지구에서는 달 가장자리의 극한 곡률에 가려 테두리 부분만 아슬아슬하게 보입니다.", desc_en:"A circular mare basin straddling the eastern equatorial horizon, with more than half extending onto the far side. From Earth, only a razor-thin sliver is barely visible due to extreme limb curvature.", obs:"[추천 관측 월령: 동쪽 칭동 최대 시]\n[최적의 관측 타이밍]\n관측 성공 여부가 칭동(Libration)에 완전히 달려 있습니다. 달이 우측(동쪽)으로 고개를 최대로 돌려주는 날을 달력에서 확인하고 노려야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n칭동이 유리한 날 저배율 아이피스로 관측합니다. 평소에는 우주 공간이 뚫려 있어야 할 우측 지평선 가장자리에, 거대하고 짙은 어두운 얼룩 덩어리가 곡선을 그리며 살짝 넘어와 있는 신비로운 모습을 포착하는 짜릿함을 느껴보세요.\n[사진 촬영 팁]\n지평선 가장자리 영역은 대기의 굴절이 심하여 화질이 뭉개지기 십상입니다. 카메라 노출을 아주 짧게 끊어(High framerate) 흔들림 없는 선명한 프레임만을 철저히 선별하여 합성해야 합니다.", obs_en:"[Recommended Moon Age: Max East Libration]\n[Optimal Timing]\nObservation success depends entirely on libration. You must check calendars and target days when the moon tilts its right (eastern) face maximally towards us.\n[What to look for? (Visual)]\nOn a favorable libration day, use low power. Experience the thrill of spotting a massive, dark blob curving just over the right-side horizon—occupying space that is usually empty void—a truly mysterious sight.\n[Astrophotography Tips]\nThe extreme limb region suffers severely from atmospheric refraction blurring. You must shoot with very short exposures (high framerate) and strictly sort/stack only the blur-free, sharpest frames."},
            {id:74, name:"코페르니쿠스 H (Copernicus H)", sig:"암색 후광", sig_en:"Dark Halo", lat:6.9, lng:-18.3, diam:5, desc:"코페르니쿠스 바로 남동쪽에 위치한 5km 미만의 작고 기이한 충돌구입니다. 소행성이 얕게 묻혀 있던 어두운 현무암 용암층을 파내어 까만 물질을 뿜어내며 암색 후광(Dark Halo)을 둘렀습니다.", desc_en:"A tiny <5km bizarre crater SE of Copernicus. An asteroid struck a shallow buried layer of dark basalt, spewing pitch-black material instead and forming a prominent Dark Halo.", obs:"[추천 관측 월령: 9~10일경, 23~24일경]\n[최적의 관측 타이밍]\n하얗고 검은 알베도 대비가 주제이므로, 태양빛이 정면으로 쏟아져 광조가 가장 눈부시게 밝아질 때가 어두운 후광을 상대적으로 돋보이게 만듭니다.\n[무엇을 봐야 할까? (안시 관측)]\n코페르니쿠스가 뿜어낸 눈부시게 하얀 광조 도화지 위를 150배 이상의 배율로 꼼꼼히 스캔해 보십시오. 하얀 바탕 한가운데에 검은 잉크가 둥글게 번진 것처럼 짙은 후광을 뿜어내며 까맣게 타버린 듯한 작고 기묘한 구멍을 발견할 수 있습니다. 굴절 망원경의 높은 콘트라스트가 식별에 유리합니다.\n[사진 촬영 팁]\n하얀 바탕과 검은 후광의 디테일을 동시에 잡기 위해 컬러 카메라를 사용하고 채도를 아주 살짝만 높여주면 화학 성분 차이가 자연스럽게 드러납니다.", obs_en:"[Recommended Moon Age: 9~10 days, 23~24 days]\n[Optimal Timing]\nSince black/white albedo contrast is the theme, observing when direct sunlight makes the rays blindingly bright makes the dark halo stand out relatively more.\n[What to look for? (Visual)]\nMeticulously scan the blindingly white ray canvas from Copernicus at 150x+. Right in the middle of the white background, discover a strange, tiny hole looking charred black, radiating a thick dark halo like a round ink stain. High-contrast refractors are advantageous.\n[Astrophotography Tips]\nTo capture details of both the white canvas and black halo, use a color camera and slightly boost saturation to naturally reveal the chemical composition differences."},
            {id:75, name:"프톨레마이오스 B (Ptolemaeus B)", sig:"유령 크레이터", sig_en:"Ghost Crater", lat:-8.0, lng:-0.8, diam:16, desc:"프톨레마이오스 크레이터 바닥 북쪽에 숨겨진 직경 16km의 유령 크레이터입니다. 막대한 양의 분출물과 용암이 바닥을 완전히 덮어버려 테두리 능선의 가장 높은 부분만이 수면 위로 얕게 살아남았습니다.", desc_en:"A 16km Ghost Crater hidden in northern Ptolemaeus. A massive deluge of ejecta and lava completely buried its floor. Only the very highest crests of its rim outline shallowly survive above the 'surface'.", obs:"[추천 관측 월령: 7~8일경, 21~22일경]\n[최적의 관측 타이밍]\n바닥과 테두리의 단차가 불과 수 미터 수준이므로, 조명각이 단 1도라도 높아지면 완전히 스텔스 모드가 됩니다. 정확한 일출/일몰의 얕은 사선광 타이밍이 필수입니다.\n[무엇을 봐야 할까? (안시 관측)]\n프톨레마이오스에 그림자가 길게 깔리는 시기에 맞춰 150배율 이상을 적용하세요. 매끄러운 잿빛 평원 위에 누군가 바늘로 얕게 긁어놓은 듯한 직경 16km의 희미하고 미묘한 동심원 링 윤곽을 포착해 내는 초정밀 관측이 목표입니다.\n[사진 촬영 팁]\n희미한 융기 윤곽을 살리기 위해, 럭키 이미징 스태킹 후 언샤프 마스크(Unsharp Mask)나 웨이블릿(Wavelet) 처리에서 반경(Radius)을 넓게 주어 거시적인 명암 대비를 끌어올리세요.", obs_en:"[Recommended Moon Age: 7~8 days, 21~22 days]\n[Optimal Timing]\nElevation difference is mere meters, so it goes full stealth if sun angle rises even 1 degree. Exact sunrise/sunset shallow slanted light timing is essential.\n[What to look for? (Visual)]\nWhen long shadows drape Ptolemaeus, apply 150x+. Your goal is ultra-precision observation: catch the faint, subtle concentric ring outline—looking as if someone lightly scratched a 16km circle with a needle on the smooth ashen plain.\n[Astrophotography Tips]\nTo bring out the faint uplifted outline, use a wider Radius in Unsharp Mask or Wavelet processing after Lucky Imaging stacking to boost macroscopic tonal contrast."},
            {id:76, name:"W. 본드 (W. Bond)", sig:"거대 사각형", sig_en:"Giant Rectangle", lat:65.3, lng:3.7, diam:158, desc:"달 북극 근처 추위의 바다 위쪽에 위치한 고대 크레이터 잔해입니다. 파편 폭격과 지각 변동으로 원래의 테두리가 완전히 붕괴되어 다이아몬드나 불규칙한 거대 사각형 평원에 가까운 기이한 모습입니다.", desc_en:"An ancient crater remnant near the north pole. Massive debris bombardment completely collapsed its original rim, leaving it resembling a bizarre, irregular giant rectangular or diamond-shaped plain.", obs:"[추천 관측 월령: 7~8일경, 21~22일경]\n[최적의 관측 타이밍]\n북극 극지방에 위치해 있어 태양빛이 항상 비스듬하게 낮게 깔리므로 상/하현 부근이라면 언제든 훌륭한 그림자 입체감을 감상할 수 있습니다.\n[무엇을 봐야 할까? (안시 관측)]\n중저배율(80~100배)을 사용하여 주변의 전형적인 원형 크레이터들 사이를 훑어보십시오. 바닥이 평평하고 거대한 비정형 직사각형 모양의 윤곽선과 각진 모서리를 가진 이질적인 지형을 짚어내며 고대 달의 폭력적인 파괴 흔적을 느끼는 것이 감상 포인트입니다.\n[사진 촬영 팁]\n달의 북쪽 가장자리 근처의 심한 원근감(Foreshortening)과 사각형 형태가 어우러져 만드는 독특한 기하학적 형상을 넓은 화각으로 프레이밍 하십시오.", obs_en:"[Recommended Moon Age: 7~8 days, 21~22 days]\n[Optimal Timing]\nLocated at the north pole, sunlight always hits at a low angle. You can enjoy excellent 3D shadows anytime near the quarter moons.\n[What to look for? (Visual)]\nUse medium-low power (80-100x) to scan among typical circular craters. Pick out this alien terrain with its flat floor, massive irregular rectangular outline, and angular corners, feeling the scars of the moon's violent destruction.\n[Astrophotography Tips]\nFrame with a wide field of view to capture the unique geometry created by the combination of severe foreshortening near the northern limb and the crater's rectangular shape."},
            {id:77, name:"시르살리스 릴 (Sirsalis Rille)", sig:"최장 선형 릴", sig_en:"Longest Rille", lat:-15.7, lng:-61.7, diam:425, desc:"폭풍의 대양 남서쪽 경계면을 따라 평행하게 400km 이상 끊김 없이 가로지르는 달에서 가장 길고 거대한 지각 균열(단층대)입니다. 폭풍의 대양 분지가 가라앉으며 발생한 장력이 지각을 수직으로 찢은 계곡입니다.", desc_en:"The moon's longest and most massive crustal fracture, cutting a clean line for >400km parallel to SW Oceanus Procellarum. Extreme tension from the sinking basin vertically tore the crust.", obs:"[추천 관측 월령: 13일경, 27일경]\n[최적의 관측 타이밍]\n깊고 긴 단층 계곡 내부로 검고 날카로운 그림자가 드리워지는 13일경 상현 후반부가 가장 압도적입니다.\n[무엇을 봐야 할까? (안시 관측)]\n100배율 아이피스로 시르살리스 크레이터를 찾으십시오. 그 바로 옆에서 시작하여 남북으로 거침없이 뻗어가는 칼자국을 따라 시야를 계속 옮겨보세요. 이 거대한 지각 균열이 앞을 막아선 고지대의 험준한 산맥과 다른 크레이터 테두리들까지 가차 없이 일직선으로 썰어버리며 관통하는 장관을 스캔하십시오.\n[사진 촬영 팁]\n단일 센서로는 400km의 길이를 고해상도로 쪼개 담기 어려우므로, 화각을 대각선으로 최대로 활용하거나 두세 장의 프레임을 세밀하게 모자이크 합성해 그 엄청난 스케일을 구현하십시오.", obs_en:"[Recommended Moon Age: 13 days, 27 days]\n[Optimal Timing]\nThe latter half of the waxing gibbous phase (day 13) is most overwhelming, as deep, sharp black shadows are cast inside the long fault valley.\n[What to look for? (Visual)]\nLocate Sirsalis crater at 100x. Follow the knife-cut starting right next to it, surging relentlessly north-south. Scan the grand spectacle of this massive fracture refusing to stop, mercilessly slicing straight through rugged mountains and crater rims blocking its path.\n[Astrophotography Tips]\nCapturing 400km in high-res on a single sensor is tough. Utilize the maximum diagonal framing or meticulously stitch 2-3 mosaic panels to realize its incredible scale."},
            {id:78, name:"람베르트 R (Lambert R)", sig:"용암 링", sig_en:"Ghost Ring", lat:23.8, lng:-20.6, diam:54, desc:"비의 바다 남쪽 평원 한가운데에 완전히 파묻힌 완벽한 유령 크레이터(Ghost Ring)입니다. 거대 용암 쓰나미가 덮쳐 전체를 수몰시켰고, 가장 높았던 외벽 산봉우리의 꼭대기만 수면 위로 점선처럼 드러나 링을 그립니다.", desc_en:"A perfect Ghost Ring completely buried in southern Mare Imbrium. A massive lava tsunami submerged the entire crater. Only the very tips of its highest outer rim peaks protrude like a dotted line.", obs:"[추천 관측 월령: 9~10일경, 23~24일경]\n[최적의 관측 타이밍]\n정면 조명에서는 완전히 보이지 않습니다. 일출이나 일몰 시 태양 고도가 1~2도에 불과하여 그림자가 수십 킬로미터씩 늘어지는 극한의 찰나 타이밍을 잡아야만 관측할 수 있습니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배율 이상의 고배율로 아무것도 없는 매끈한 평면 위를 스캔하다가, 희미한 점선들이 완벽하게 동그란 링 형태로 튀어나와 부드러운 음영을 던지는 유령 같은 융기 돌출부를 찾아내십시오. 점선 고리 안팎의 용암 바다 수면이 평행하게 이어지는 고요함이 핵심입니다.\n[사진 촬영 팁]\n점선의 미세한 돌출부를 노이즈 없이 부드럽게 표현하는 것이 생명입니다. 노출 부족 시 질감이 거칠어지므로 게인을 올려 충분한 히스토그램을 확보하세요.", obs_en:"[Recommended Moon Age: 9~10 days, 23~24 days]\n[Optimal Timing]\nInvisible under direct light. You must catch the extreme fleeting timing at sunrise/sunset when the 1-2 degree sun elevation casts tens-of-kilometer-long shadows.\n[What to look for? (Visual)]\nScan the seemingly empty smooth plain at 150x+, hunting for ghost-like raised protrusions where faint dotted lines pop out in a perfect circle, casting soft shadows. The key is the serene parallel continuation of the lava 'sea level' inside and outside the ring.\n[Astrophotography Tips]\nSmoothly expressing the fine dotted protrusions without noise is vital. Underexposure makes the texture rough; raise the gain to secure a sufficient, clean histogram."},
            {id:79, name:"더위의 만 (Sinus Aestuum)", sig:"검은 맨틀", sig_en:"Dark Mantle", lat:12.0, lng:-3.5, diam:90, desc:"빛나는 아펜니노 산맥 남서쪽의 평원입니다. 철과 티타늄 성분이 극도로 높은 흑색 유리질 화산재(Dark Mantle Deposit)가 구역을 아주 두껍게 덮고 있어, 달 표면에서 기괴할 정도로 가장 짙은 어둠을 띱니다.", desc_en:"A plain SW of the bright Apennine Mountains. A highly iron/titanium-rich black glassy volcanic ash (Dark Mantle Deposit) thickly blankets this region, making it bizarrely intense and dark.", obs:"[추천 관측 월령: 보름 전후]\n[최적의 관측 타이밍]\n지형의 요철이 아니라 극단적인 토양의 알베도(반사율) 차이를 즐기는 대상이므로 보름달 무렵의 정면 조명 하에서 최고의 모습을 보여줍니다.\n[무엇을 봐야 할까? (안시 관측)]\n쌍안경이나 저배율 아이피스에 달 필터를 끼우고 관측하십시오. 눈부시게 밝은 아펜니노 산맥의 화이트와 바로 아래 펼쳐진 시꺼먼 숯가루나 먹물을 광범위하게 뿌려놓은 듯한 알베도 톤의 극단적인 흑백 대조를 단번에 체감할 수 있습니다.\n[사진 촬영 팁]\n미네랄 문(Mineral Moon) 후보정을 통해 티타늄의 농도에 따라 어두운 화산재 층이 진한 딥 블루(Deep Blue) 톤으로 강하게 발색되는 과학적인 이미지를 만들어 보세요.", obs_en:"[Recommended Moon Age: Around Full Moon]\n[Optimal Timing]\nSince you're enjoying extreme soil albedo (reflectivity) differences rather than topography, it shows its best appearance under direct lighting near full moon.\n[What to look for? (Visual)]\nObserve using binoculars or low power with a Moon filter. Instantly feel the extreme black-and-white tonal contrast: the dazzling white Apennines right next to a region looking as if someone extensively scattered charcoal powder or pitch-black ink.\n[Astrophotography Tips]\nUse Mineral Moon post-processing. Based on titanium concentration, aggressively extract scientific images where the dark ash layer strongly renders into a deep blue tone."},
            {id:80, name:"동방의 바다 (Orientale Basin)", sig:"다중 고리", sig_en:"Multi-ring Basin", lat:-19.0, lng:-95.0, diam:930, desc:"지질학적 진화 역사상 가장 마지막에 형성된 직경 930km의 거대 충돌 분지입니다. 분지 중앙에서 바깥쪽으로 코르디예라 산맥 등이 그리는 3중 동심원 산맥 고리 구조를 완벽하게 보존한 태양계 으뜸 분지입니다.", desc_en:"A 930km impact basin formed last in geological history. It flawlessly preserves a textbook triple-concentric multi-ring mountain structure radiating from its center, making it the premier basin.", obs:"[추천 관측 월령: 서쪽 칭동 최대 시]\n[최적의 관측 타이밍]\n달 서쪽 가장자리를 넘어가 있어 평소엔 볼 수 없습니다. 달의 서쪽 면이 지구를 향해 최대치로 끄덕여주는 단 며칠의 기회를 달력에서 확인해야만 하는 극악 난이도 타겟입니다.\n[무엇을 봐야 할까? (안시 관측)]\n칭동이 호조건일 때 100배율 아이피스로 서쪽 가장자리 너머를 간절히 훔쳐보십시오. 구형의 지평선 곡선과 완벽하게 평행을 이루며 아슬아슬하게 튀어나온 거대한 3겹 산맥 고리들의 외곽선을 포착하는 극한의 시각적 카타르시스를 경험하십시오.\n[사진 촬영 팁]\n지평선 극단에 위치하여 대기 굴절에 의한 파란/빨간 색수차가 극심하게 발생합니다. 대기 분산 보정기(ADC)를 정확하게 셋팅하지 않으면 산맥의 선명한 실루엣이 전부 뭉개집니다.", obs_en:"[Recommended Moon Age: Max West Libration]\n[Optimal Timing]\nNormally invisible past the western limb. An extremely difficult target requiring you to check calendars for the few days when libration nods the west face maximally towards Earth.\n[What to look for? (Visual)]\nDesperately peek past the western limb at 100x during favorable libration. Experience extreme visual catharsis catching the outlines of the three massive mountain rings precariously protruding, perfectly parallel to the spherical curve of the horizon.\n[Astrophotography Tips]\nBeing on the extreme limb, blue/red chromatic aberration from atmospheric refraction is severe. If you don't perfectly tune an Atmospheric Dispersion Corrector (ADC), the sharp mountain silhouettes will be completely blurred."},
            {id:81, name:"헤시오두스 A (Hesiodus A)", sig:"이중 동심원", sig_en:"Concentric Crater", lat:-30.1, lng:-17.0, diam:15, desc:"구름의 바다 남쪽에 위치한 매우 특이한 직경 15km의 분화구입니다. 바닥 정중앙에 완벽한 원형을 그리는 또 하나의 내부 테두리가 동심원으로 솟아 있어 양궁 과녁의 불스아이(Bullseye)를 연상시킵니다.", desc_en:"A highly unusual 15km crater. A perfect circular second inner rim protrudes convexly dead center in a concentric structure, strongly reminiscent of an archery target bullseye.", obs:"[추천 관측 월령: 8~9일경, 22~23일경]\n[최적의 관측 타이밍]\n아주 작은 내부 이중 링에 미세한 입체 그림자가 드리워질 수 있도록 명암 경계선이 살짝 스치고 지나가는 타이밍을 잡아야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n외곽 직경이 15km에 불과하고 내부 링은 훨씬 작으므로 뛰어난 광학계 분해능과 안정된 기류(Seeing)가 필수입니다. 200배 이상의 고배율과 예리한 초점을 맞추어 중앙의 정밀한 이중 링 구조가 만들어내는 얇은 두 겹의 그림자 테두리를 광학적으로 분리해 내는 쾌감을 맛보십시오.\n[사진 촬영 팁]\n내부 링이 외벽보다 훨씬 얕기 때문에, 빛 반사 하이라이트가 날아가지(Clipping) 않게 카메라 게인을 낮추고 세심하게 히스토그램을 모니터링하며 캡처하세요.", obs_en:"[Recommended Moon Age: 8~9 days, 22~23 days]\n[Optimal Timing]\nYou must catch the timing when the terminator just grazes by, allowing fine 3D shadows to be cast inside the tiny inner double ring.\n[What to look for? (Visual)]\nWith a 15km outer diameter and much smaller inner ring, excellent optical resolution and steady seeing are mandatory. Dial in 200x+ power and sharp focus to taste the thrill of optically resolving the thin, double-layered shadow rims cast by the precise central double-ring structure.\n[Astrophotography Tips]\nBecause the inner ring is much shallower than the outer wall, lower the camera gain to prevent blowing out (clipping) the light-reflection highlights, monitoring the histogram carefully during capture."},
            {id:82, name:"린네 (Linné)", sig:"밝은 점", sig_en:"Bright Spot", lat:27.7, lng:11.8, diam:2.4, desc:"맑음의 바다 한가운데 점처럼 찍혀 있는 직경 2.2km, 깊이 600m의 아주 작고 밝은 밥그릇 모양 분화구입니다. 과거 망원경 성능의 한계와 대기 요동 때문에 구름으로 오인되어, 달에 화산 활동이 살아있다는 논란을 빚었습니다.", desc_en:"A tiny 2.2km, 600m deep bowl-shaped crater dotted in Mare Serenitatis. Past telescope limits and atmospheric seeing led it to be mistaken for a cloud, sparking a 'living moon' controversy.", obs:"[추천 관측 월령: 8일경~보름, 22일경]\n[최적의 관측 타이밍]\n조명각이 높아져 그림자가 사라지고 토양의 반사율(Albedo)이 극한으로 밝아지는 보름달 전후가 관측에 가장 좋습니다.\n[무엇을 봐야 할까? (안시 관측)]\n이 대상은 구멍의 형태를 보기보다는 반사율의 극단적 대조를 즐기는 타겟입니다. 어둡고 거무스름한 맑음의 바다를 80배 이상의 중배율로 훑어보세요. 짙은 회색 도화지 위에 하얀 수정 펜으로 콕 찍어 놓은 듯, 유난히 쨍하고 하얗게 반짝이는 밝은 점을 아주 쉽게 찾아낼 수 있습니다.\n[사진 촬영 팁]\n크레이터 자체의 분해능보다는 주변 어두운 바다와의 광도 차이를 깔끔하게 잡아내는 것이 관건입니다. 미네랄 문 처리 시 주변 현무암 톤을 풍부하게 살려 하얀 점이 더욱 돋보이게 보정하세요.", obs_en:"[Recommended Moon Age: 8 days~Full, 22 days]\n[Optimal Timing]\nBest around full moon when sun angles are high, shadows vanish, and soil albedo (reflectivity) becomes extremely bright.\n[What to look for? (Visual)]\nEnjoy extreme albedo contrast rather than hole shapes. Scan the dark grayish Mare Serenitatis at 80x+. Like a dot of white correction fluid on dark gray paper, you can effortlessly find this tiny but exceptionally white, brilliantly shining bright spot.\n[Astrophotography Tips]\nThe key is cleanly capturing the luminosity difference against the dark mare, rather than resolving the crater itself. In Mineral Moon processing, enrich the surrounding basalt tones to make the white dot pop even more."},
            {id:83, name:"플라톤 소구덩이 (Plato Craterlets)", sig:"분해능 테스트", sig_en:"Resolution Test", lat:51.6, lng:-9.4, diam:101, desc:"스케이트장처럼 매끄러운 101km 직경의 플라톤 크레이터 바닥 위에 무심하게 찍혀 있는 4~5개의 아주 작은 소구덩이(1~2.7km)들입니다. 전 세계 아마추어들의 망원경 광학계와 대기 시상을 평가하는 전설적인 분해능 챌린지 타겟입니다.", desc_en:"4-5 tiny craterlets (1-2.7km) carelessly dotted across the 101km ice-rink smooth floor of Plato crater. A legendary resolution challenge to evaluate optics and upper atmosphere seeing.", obs:"[추천 관측 월령: 8~9일경, 22~23일경]\n[최적의 관측 타이밍]\n조명각이 너무 높으면 반사율 차이에 묻히므로, 명암 경계선이 살짝 비켜나 구덩이 내부에 미세한 그림자가 지는 타이밍이 식별에 가장 유리합니다.\n[무엇을 봐야 할까? (안시 관측)]\n대기 흔들림이 멈추는 최상의 날씨(Seeing 4/5 이상)에 8인치 이상의 대구경 망원경에 200~250배 이상의 극한 배율을 세팅하십시오. 눈이 아플 정도로 집중하여 까만 스케이트장 표면 위에서 바늘구멍처럼 뚫려 있는 구덩이들을 최대 4개 이상 시각적으로 분리해 낼 수 있는지 당신의 한계를 테스트하세요.\n[사진 촬영 팁]\n적외선(IR 742nm 등) 필터와 최상급 트리플렛 바로우(3x) 렌즈를 결합하여 초점비를 F/15~F/20 이상으로 밀어붙인 극한의 럭키 이미징 기법만이 답입니다.", obs_en:"[Recommended Moon Age: 8~9 days, 22~23 days]\n[Optimal Timing]\nIf sun angle is too high, they get lost in albedo glare. Identifying them is best when the terminator slightly passes, casting tiny shadows inside the pits.\n[What to look for? (Visual)]\nOn a night of perfect seeing (4/5+), set an 8-inch+ telescope to extreme 200-250x+ magnification. Concentrate until your eyes water, testing your limits to see if you can visually separate 4 or more pinhole-like pits on the black ice-rink surface.\n[Astrophotography Tips]\nThe only answer is extreme Lucky Imaging: combine an IR filter (e.g., 742nm) with a top-tier Triplet Barlow (3x) to push your focal ratio to F/15-F/20 or beyond."},
            {id:84, name:"피타투스 (Pitatus)", sig:"동심원 균열", sig_en:"Concentric Rilles", lat:-29.8, lng:-13.5, diam:97, desc:"구름의 바다 남쪽 해안의 크레이터입니다. 과거 마그마 압력으로 현무암 바닥 지반이 부풀어 오르면서 바닥과 바깥쪽 테두리 산맥이 만나는 경계선을 따라 마치 칼로 도려낸 듯 둥글게 원형 균열이 깊게 파인 '바닥 균열 크레이터'입니다.", desc_en:"A crater on southern Mare Nubium. Past magma pressure domed its basalt floor. Consequently, along the boundary where the floor meets the outer mountain wall, a deep concentric rille was carved in a circle as if sliced by a knife.", obs:"[추천 관측 월령: 8~9일경, 22~23일경]\n[최적의 관측 타이밍]\n바닥과 외벽 사이의 미세한 곡선 틈새 그림자를 뚜렷하게 보기 위해서는 조명각이 매우 낮게 깔리는 사선광 타이밍을 놓치지 말아야 합니다.\n[무엇을 봐야 할까? (안시 관측)]\n150배 이상의 배율로 피타투스 내부 테두리를 빙빙 돌며 스캔하세요. 용암 바닥과 거친 산맥 성벽이 부드럽게 이어지지 않고, 그 둘 사이를 단절시키듯 칼로 깊게 도려낸 가느다란 호 모양의 단층선 틈새를 찾아 그림자 각도를 통해 3D 입체감을 직접 확인하십시오.\n[사진 촬영 팁]\n테두리의 그림자가 안쪽 틈새(Rille)를 가려버리지 않도록 타이밍과 프레이밍에 유의하고, 바닥 표면의 매끄러움과 틈새의 날카로움을 대비되도록 후보정하세요.", obs_en:"[Recommended Moon Age: 8~9 days, 22~23 days]\n[Optimal Timing]\nTo clearly see the fine curved gap shadow between the floor and outer wall, you must not miss the timing of extreme low-angle slanted light.\n[What to look for? (Visual)]\nScan around the inner rim of Pitatus at 150x+. Note that the lava floor and rough mountain wall do not connect smoothly; find the thin, arc-shaped fault trench knife-cutting and severing the two, confirming its 3D depth via shadowing.\n[Astrophotography Tips]\nBe careful with timing and framing so the rim's shadow doesn't obscure the inner rille. Post-process to contrast the smoothness of the floor against the sharpness of the gap."},
            {id:85, name:"랑그레누스 광조 (Langrenus Rays)", sig:"노화된 광조", sig_en:"Aged Rays", lat:-8.9, lng:60.9, diam:132, desc:"풍요의 바다 동쪽 가장자리의 장엄한 132km 크레이터 주변으로 뻗어 나가는 방사형 광조입니다. 튀코처럼 밝게 형성되었으나, 수억 년의 우주 풍화(Space Weathering) 작용을 겪으며 신선한 하얀색을 잃고 주변 토양과 비슷하게 흐릿하고 탁하게 늙어간 진화의 흔적입니다.", desc_en:"A radial ray system extending around a majestic 132km crater. Formed bright like Tycho, but after hundreds of millions of years of space weathering, it lost its fresh white color, fading into a dull, blurry gray blending with surrounding soil.", obs:"[추천 관측 월령: 보름 전후]\n[최적의 관측 타이밍]\n광조 시스템은 그림자가 소멸하고 알베도(반사율)가 극대화되는 보름달 무렵에 관측해야 제모습을 볼 수 있습니다.\n[무엇을 봐야 할까? (안시 관측)]\n쌍안경이나 저배율 아이피스에 달 필터(ND)를 장착하고 관측하십시오. 튀코(Tycho) 크레이터가 발산하는 눈이 시리게 밝고 가느다란 '젊은 광조'의 쨍한 느낌과 비교하여, 랑그레누스 주변으로 퍼져 있는 '노화된 광조'의 상대적으로 희미하고 두껍게 퍼진 탁한 톤의 차이를 음미하며 우주의 시간을 느껴보세요.\n[사진 촬영 팁]\n채도를 높이는 Mineral Moon 기법을 적용하면 흐릿한 광조 부분만 주변 바다(Mare)와 미묘하게 다른 토양 성분 톤(회백색~옅은 파란색)을 띠는 것을 확인할 수 있습니다.", obs_en:"[Recommended Moon Age: Around Full Moon]\n[Optimal Timing]\nRay systems must be observed near full moon when shadows vanish and albedo (reflectivity) is maximized to see their true form.\n[What to look for? (Visual)]\nObserve using binoculars or low power with an ND filter. Compare the piercingly bright, thin, crisp 'young rays' radiating from Tycho with the relatively faint, thickly diffused, dull tones of the 'aged rays' spreading around Langrenus, savoring the passage of cosmic time.\n[Astrophotography Tips]\nApplying the saturation-boosting Mineral Moon technique reveals that the faded rays take on a subtly different soil composition tone (gray-white to light blue) compared to the surrounding mare."},
            {id:86, name:"프린츠 릴 (Prinz Rilles)", sig:"복잡한 릴", sig_en:"Complex Rilles", lat:27.0, lng:-43.0, diam:46, desc:"아리스타르쿠스 고원 근처, 용암에 반쯤 파묻힌 프린츠 크레이터 북쪽 평원에 거미줄이나 나뭇가지처럼 불규칙하게 얽혀 파여 있는 대규모 화산 수로 네트워크입니다. 지하 마그마가 여러 벤트(함몰 구멍)를 뚫고 터져 나와 사방으로 용암 강줄기를 파놓았습니다.", desc_en:"A large network of sinuous rilles irregularly tangled like spiderwebs or branches north of the half-buried Prinz crater. Underground magma burst through multiple vents (collapse calderas), carving complex lava riverbeds in all directions.", obs:"[추천 관측 월령: 12~13일경, 26~27일경]\n[최적의 관측 타이밍]\n미세하고 복잡한 수로 내부로 선명한 검은 그림자가 깊게 박히는 12일이나 26일의 얕은 사선광 타이밍이 필수적입니다.\n[무엇을 봐야 할까? (안시 관측)]\n바로 옆 달 최대의 단일 수로인 '슈뢰터 계곡'의 굵직한 모습과 비교하기 훌륭한 타겟입니다. 200배 이상의 고배율로 슈뢰터 계곡보다 훨씬 가늘고 불규칙하게 평원을 뻗어 나가는 섬세한 릴들의 흐름을 쫓고, 각 릴의 발원지가 되는 둥글고 움푹 파인 화산 벤트(Vent) 구멍들을 역추적하는 정밀 탐사를 즐겨보세요.\n[사진 촬영 팁]\n시상이 완벽하게 열리는 순간, IR-Pass 필터를 끼운 상태에서 게인을 높여 초당 100프레임 이상의 초고속으로 수만 장을 쓸어담아 스태킹하여 얽힌 실타래 같은 디테일을 뽑아내세요.", obs_en:"[Recommended Moon Age: 12~13 days, 26~27 days]\n[Optimal Timing]\nThe shallow slanted light timing of day 12 or 26 is essential to cast sharp black shadows deep inside the fine, complex channels.\n[What to look for? (Visual)]\nExcellent for comparing with the massive, single channel of the adjacent 'Schröter's Valley'. At 200x+, trace the flow of these delicate rilles spreading across the plains much thinner and more erratically than Schröter's. Enjoy the precise exploration of tracking them back to their sources: the round, indented volcanic vent holes.\n[Astrophotography Tips]\nWhen seeing perfectly opens up, use an IR-Pass filter, raise the gain, and sweep up tens of thousands of frames at ultra-high speed (>100 fps) to stack and extract the tangled-thread details."},
            {id:87, name:"훔볼트 (Humboldt)", sig:"균열된 중앙", sig_en:"Fractured Floor", lat:-27.0, lng:80.9, diam:207, desc:"달 남동쪽 가장자리에 위치한 직경 207km의 경이로운 크레이터입니다. 중앙에 거대한 산맥급 봉우리 복합체가 솟아 있고, 주변 바닥 지반은 지하 마그마의 압력으로 부풀어 올라 거북이 등껍질처럼 방사형 및 동심원상으로 갈기갈기 찢어진(Floor-fractured) 장엄한 형태를 띠고 있습니다.", desc_en:"A marvelous 207km crater on the SE limb. In its center rises a huge mountain-class peak complex. The surrounding floor was subjected to magma pressure, swelling up and majestically tearing to shreds (floor-fractured) in radial and concentric patterns like a turtle shell.", obs:"[추천 관측 월령: 동남 칭동 최대 시]\n[최적의 관측 타이밍]\n가장자리에 숨어 있어 칭동(Libration)이 동남쪽으로 최대치로 기울어 달이 얼굴을 보여줄 때 지평선 너머로 나타나는 희귀 타겟입니다.\n[무엇을 봐야 할까? (안시 관측)]\n지평선 가장자리에 떠오른 훔볼트를 100배~150배율 아이피스로 조준하십시오. 훔볼트 바닥의 험준한 융기 곡면과 우주 공간으로 솟은 듯한 웅장한 중앙 봉우리를 확인하고, 바닥을 가차 없이 가로지르는 뚜렷한 방사형 릴(균열) 구조들의 거친 텍스처를 샅샅이 훑어 내십시오.\n[사진 촬영 팁]\n가장자리 대기 굴절에 대응하기 위해 대기 분산 보정기(ADC)를 필수로 장착하고, 화각 안에 암흑의 우주 공간을 넉넉히 포함하여 지평선의 거친 스케일을 극대화하세요.", obs_en:"[Recommended Moon Age: Max SE Libration]\n[Optimal Timing]\nHidden on the limb, it's a rare target appearing over the horizon only when SE libration is maximal and the moon shows us its face.\n[What to look for? (Visual)]\nAim at Humboldt rising on the horizon at 100-150x. Confirm the rugged uplifted floor curves and the majestic central peaks looking as if thrust into space. Meticulously scan the rough texture of the distinct radial rilles (fractures) mercilessly crossing the floor.\n[Astrophotography Tips]\nTo counter limb atmospheric refraction, an ADC is absolutely essential. Include plenty of the dark void of space in the frame to maximize the rugged, cosmic scale of the horizon."},
            {id:88, name:"피어리 (Peary)", sig:"영구 음영", sig_en:"Permanent Shadow", lat:88.6, lng:33.0, diam:74, desc:"달의 진북(True North Pole)에 아슬아슬하게 맞닿아 있는 직경 74km의 분화구입니다. 자전축 기울기가 불과 1.5도라 태양빛이 항상 지평선을 스치듯 비추며, 바닥에는 수십억 년간 햇빛이 들지 않은 캄캄한 '영구 음영 지역'이 존재해 얼음이 있을 확률이 높습니다.", desc_en:"A 74km crater precariously touching the True North Pole. With an axial tilt of only 1.5 degrees, sunlight always grazes the horizon. Its floor harbors a pitch-black 'Permanently Shadowed Region' untouched by sunlight for billions of years, a prime candidate for water ice.", obs:"[추천 관측 월령: 북쪽 칭동 시]\n[최적의 관측 타이밍]\n달의 북쪽 칭동이 최대가 되어 북극 극지방이 우주 공간을 향해 고개를 깊게 숙여 우리에게 보여줄 때를 노리십시오.\n[무엇을 봐야 할까? (안시 관측)]\n배율을 150배 이상 올리고 칠흑 같은 북쪽 끝 극한의 어둠 속을 조준하십시오. 태양빛을 받아 날카로운 톱니바퀴나 보석처럼 반짝이는 피어리 크레이터의 남쪽 가장자리 산봉우리 실루엣들을 감상하세요. 그 반짝이는 산봉우리 아래로 입을 벌린 영원한 어둠의 심연을 상상하며 우주의 경이로움을 느껴보십시오.\n[사진 촬영 팁]\n태양빛의 반사율이 극단적으로 대비되므로, 게인을 과감히 낮춰 반짝이는 봉우리의 디테일이 하얗게 타버리지(Clipping) 않게 촬영하는 것이 중요합니다.", obs_en:"[Recommended Moon Age: North Libration]\n[Optimal Timing]\nTarget when north libration is maximal, tilting the north polar region deeply towards us into space.\n[What to look for? (Visual)]\nPush magnification to 150x+ and aim into the pitch-black extreme northern darkness. Admire the silhouettes of Peary's southern rim peaks glittering in the sunlight like sharp saw-teeth or jewels. Feel cosmic wonder by imagining the gaping abyss of eternal darkness spreading below those glittering peaks.\n[Astrophotography Tips]\nBecause of the extreme sunlight contrast, aggressively lower the gain to ensure the brilliant details of the glittering peaks aren't blown out (clipped)."},
            {id:89, name:"발렌타인 돔 (Valentine Dome)", sig:"하트 화산", sig_en:"Heart Volcano", lat:30.5, lng:10.1, diam:30, desc:"맑음의 바다 서쪽 평면 위에 홀로 솟아 있는 직경 30km, 높이 120m 수준의 거대한 방패 화산(Shield Volcano) 돔입니다. 점성이 낮은 현무암 용암이 천천히 흘러 융기된 둥근 외곽선 모양이 마치 서양의 완벽한 밸런타인 '하트(Heart)' 모양을 꼭 빼닮았습니다.", desc_en:"A massive shield volcano dome, ~30km wide but only 120m high, rising alone on western Mare Serenitatis. Low-viscosity basalt oozed slowly, forming an uplifted rounded outline that perfectly resembles a classic Valentine 'Heart'.", obs:"[추천 관측 월령: 7일경, 21일경]\n[최적의 관측 타이밍]\n높이가 120m에 불과해 경사도가 1도 미만으로 극도로 완만합니다. 태양 고도가 조금이라도 높아지면 돔 전체가 스텔스 모드로 사라집니다. 명암 경계선이 닿는 단 몇 시간의 찰나를 조준하세요.\n[무엇을 봐야 할까? (안시 관측)]\n정확한 일출/일몰 타이밍에 100~150배율 아이피스로 관측하면, 매끈한 바다 평면 위로 도드라지게 떠오르는 사랑스럽고 부드러운 하트 모양의 입체 그림자를 소름 돋게 포착할 수 있습니다. 정상 부분의 질감 차이도 유심히 살펴보십시오.\n[사진 촬영 팁]\n그림자의 대비가 극단적으로 약하므로, 촬영 시 대비(Contrast)를 과도하게 주어 부드러운 하트 곡선을 노이즈로 훼손하지 않도록 부드러운 커브(Curves) 조절이 핵심입니다.", obs_en:"[Recommended Moon Age: 7 days, 21 days]\n[Optimal Timing]\nWith an extreme gentle slope <1 degree, it vanishes if the sun rises slightly. Target the fleeting few hours exactly when the terminator grazes it.\n[What to look for? (Visual)]\nAt precise sunrise/sunset timing, use 100-150x to capture the thrilling 3D shadow of this lovely, soft heart shape popping out prominently above the smooth mare plain. Carefully observe the textural differences near the summit.\n[Astrophotography Tips]\nShadow contrast is extremely weak; the key is soft curve adjustments during processing so you don't ruin the smooth heart curves with noise via excessive contrast boosting."},
            {id:90, name:"아폴로 11호 (Armstrong, Aldrin, & Collins)", sig:"소형 크레이터", sig_en:"Small Craters", lat:1.3, lng:23.7, diam:3, desc:"1969년 인류 최초로 달에 착륙한 아폴로 11호의 역사적인 착륙지 '고요의 기지(Tranquility Base)'에서 동쪽에 나란히 놓인 세 개의 미세 분화구입니다. 아폴로 11호 우주비행사들의 업적을 기리기 위해 명명되었습니다.", desc_en:"Three tiny craters aligned just east of 'Tranquility Base', the historic 1969 landing site of Apollo 11. Named to honor the monumental achievements of the three Apollo 11 astronauts.", obs:"[추천 관측 월령: 6~7일경, 20~21일경]\n[최적의 관측 타이밍]\n명암 경계선이 사빈과 리터 크레이터를 막 지나는 6~7일경 무렵 얕은 조명각 아래에서 식별이 가장 쉽습니다.\n[무엇을 봐야 할까? (안시 관측)]\n고요의 바다 서남쪽에 뚜렷한 쌍둥이 크레이터인 사빈(Sabine)과 리터를 이정표로 삼아 동쪽 평원으로 시야를 서서히 이동하십시오. 대기가 매우 안정적인 날 200배 이상의 고배율로 매끄러운 바다 위에 작은 점 3개가 나란히 뚫려 있는 크레이터들을 분해해 내며 '고요의 기지'를 찾아보세요.\n[사진 촬영 팁]\n고요의 기지 일대는 매우 밋밋하므로, 크레이터 호핑(Hopping) 경로 전체를 와이드하게 담아 인류의 위대한 도약 지점을 기록해 보십시오.", obs_en:"[Recommended Moon Age: 6~7 days, 20~21 days]\n[Optimal Timing]\nEasiest to identify under shallow lighting around days 6-7 when the terminator just passes Sabine and Ritter craters.\n[What to look for? (Visual)]\nUse the twin craters Sabine and Ritter as guideposts, slowly panning your field east over the plain. On a night of very steady seeing, use 200x+ to resolve these three tiny dots aligned on the smooth mare, mentally mapping out 'Tranquility Base'.\n[Astrophotography Tips]\nThe Tranquility Base area is very featureless. Frame a wide shot of the entire crater-hopping path to document the location of mankind's giant leap."},
